<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyCPA | Auditing &amp; Assurance</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;background:#F7F9FA;color:#1e293b;overflow-x:hidden;}
:root{--teal:#02AFB9;--teal-dark:#018a93;--teal-light:#e0f7f9;--deep-blue:#1E3A8A;--amber:#F59E0B;}

/* LANDING */
#landing{min-height:100vh;background:linear-gradient(135deg,#0d1b4b 0%,#051030 45%,#012025 100%);display:flex;align-items:center;justify-content:center;flex-direction:column;position:relative;overflow:hidden;}
.star{position:absolute;background:white;border-radius:50%;animation:twinkle var(--d,3s) ease-in-out infinite var(--dl,0s);opacity:0;}
@keyframes twinkle{0%,100%{opacity:0;transform:scale(.5)}50%{opacity:1;transform:scale(1)}}
.gtext{font-family:Georgia,'Times New Roman',serif;font-size:clamp(2.2rem,6vw,4.5rem);font-weight:800;background:linear-gradient(90deg,#02AFB9,#7ef9ff,#F59E0B,#02AFB9,#7ef9ff);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shine 3s linear infinite;text-align:center;}
@keyframes shine{to{background-position:200% center}}
.pring{position:absolute;border:2px solid rgba(2,175,185,.3);border-radius:50%;animation:pr 3s ease-out infinite;}
@keyframes pr{0%{transform:scale(.8);opacity:1}100%{transform:scale(2.2);opacity:0}}
.gsBtn{background:linear-gradient(135deg,#02AFB9,#018a93);color:white;border:none;padding:.9rem 2.8rem;border-radius:50px;font-size:1.05rem;font-weight:700;cursor:pointer;transition:all .3s;box-shadow:0 0 30px rgba(2,175,185,.4);letter-spacing:.05em;margin-top:1.8rem;font-family:inherit;}
.gsBtn:hover{transform:translateY(-3px);box-shadow:0 10px 40px rgba(2,175,185,.6);}
.lstat{text-align:center;color:rgba(255,255,255,.8);min-width:70px;}
.lstat-n{font-size:1.7rem;font-weight:700;}
.lstat-l{font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;opacity:.7;}
.lsep{width:1px;background:rgba(255,255,255,.15);height:40px;}

/* APP */
#app{display:none;flex-direction:column;height:100vh;}

/* TOPBAR */
#topbar{background:var(--deep-blue);color:white;padding:0 1rem;height:54px;display:flex;align-items:center;gap:.75rem;border-bottom:3px solid var(--teal);flex-shrink:0;overflow:hidden;}
#sbtoggle{background:none;border:1px solid rgba(255,255,255,.3);color:white;width:34px;height:34px;border-radius:8px;cursor:pointer;font-size:1rem;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
#sbtoggle:hover{background:rgba(255,255,255,.15);}
.toplogo{font-family:Georgia,serif;font-size:.95rem;font-weight:700;flex-shrink:0;}
.toplogo span{color:var(--teal);}
#pbwrap{flex:1;max-width:180px;background:rgba(255,255,255,.2);border-radius:20px;height:7px;overflow:hidden;}
#pbar{height:100%;background:linear-gradient(90deg,var(--teal),var(--amber));border-radius:20px;transition:width .5s;width:0%;}
.ptxt{font-size:.72rem;color:rgba(255,255,255,.8);white-space:nowrap;}
.nbtn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:white;padding:.35rem .9rem;border-radius:20px;cursor:pointer;font-size:.78rem;font-weight:600;transition:all .2s;font-family:inherit;white-space:nowrap;}
.nbtn:hover{background:var(--teal);border-color:var(--teal);}

/* BODY */
#bodywrap{display:flex;flex:1;overflow:hidden;}

/* SIDEBAR */
#sidebar{width:272px;background:var(--deep-blue);color:white;overflow-y:auto;transition:width .3s ease;flex-shrink:0;}
#sidebar.collapsed{width:0;overflow:hidden;}
#sidebar::-webkit-scrollbar{width:3px;}
#sidebar::-webkit-scrollbar-thumb{background:var(--teal);border-radius:2px;}
.sb-hdr{padding:.9rem 1.1rem .5rem;border-bottom:1px solid rgba(255,255,255,.1);}
.sb-hdr h2{font-family:Georgia,serif;font-size:.95rem;color:var(--teal);}
.tb{width:100%;text-align:left;padding:.65rem 1.1rem;background:none;border:none;color:rgba(255,255,255,.85);cursor:pointer;font-size:.78rem;font-weight:600;display:flex;align-items:center;gap:.45rem;transition:all .2s;font-family:inherit;border-left:3px solid transparent;}
.tb:hover{background:rgba(255,255,255,.07);border-left-color:var(--teal);}
.tn{background:rgba(2,175,185,.2);color:var(--teal);width:20px;height:20px;border-radius:50%;font-size:.62rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.tchev{margin-left:auto;font-size:.65rem;transition:transform .3s;}
.tb.open .tchev{transform:rotate(90deg);}
.sbl{overflow:hidden;max-height:0;transition:max-height .35s ease;background:rgba(0,0,0,.2);}
.sbl.open{max-height:700px;}
.stb{width:100%;text-align:left;padding:.45rem 1.1rem .45rem 2.8rem;background:none;border:none;color:rgba(255,255,255,.62);cursor:pointer;font-size:.73rem;display:flex;align-items:center;gap:.45rem;transition:all .2s;font-family:inherit;}
.stb:hover{color:white;background:rgba(255,255,255,.05);}
.stb.active{color:var(--teal);}
.stb .ck{font-size:.68rem;margin-left:auto;color:#22c55e;}
.sbdiv{height:1px;background:rgba(255,255,255,.1);margin:.25rem .9rem;}

/* CONTENT */
#content{flex:1;overflow-y:auto;padding:1.75rem;background:#F7F9FA;}
#content::-webkit-scrollbar{width:5px;}
#content::-webkit-scrollbar-thumb{background:var(--teal);border-radius:3px;}
.pg{display:none;animation:fadeIn .35s ease;max-width:860px;margin:0 auto;}
.pg.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* PAGE HERO */
.page-hero{background:linear-gradient(135deg,var(--deep-blue) 0%,#2d5aba 100%);border-radius:14px;padding:1.75rem;margin-bottom:1.75rem;color:white;position:relative;overflow:hidden;}
.page-hero::after{content:"";position:absolute;right:-30px;top:-30px;width:160px;height:160px;background:rgba(2,175,185,.15);border-radius:50%;}
.badge{background:rgba(2,175,185,.3);color:#7ef9ff;border:1px solid rgba(2,175,185,.5);padding:.2rem .65rem;border-radius:20px;font-size:.68rem;font-weight:700;display:inline-block;margin-bottom:.6rem;text-transform:uppercase;letter-spacing:.1em;}
.page-hero h1{font-family:Georgia,serif;font-size:clamp(1.25rem,2.5vw,1.75rem);margin-bottom:.4rem;position:relative;z-index:1;}
.page-hero p{color:rgba(255,255,255,.72);font-size:.875rem;line-height:1.6;position:relative;z-index:1;}

/* TYPOGRAPHY */
.sec{font-family:Georgia,serif;font-size:1.25rem;color:var(--deep-blue);margin:1.75rem 0 .85rem;padding-bottom:.4rem;border-bottom:2px solid var(--teal-light);}
.ssec{font-size:.95rem;font-weight:700;color:var(--deep-blue);margin:.85rem 0 .5rem;}
.cp{font-size:.875rem;line-height:1.75;color:#334155;margin-bottom:.65rem;}
.cl{padding-left:1.4rem;margin:.65rem 0;}
.cl li{margin-bottom:.35rem;font-size:.875rem;line-height:1.6;color:#334155;}
.cl li::marker{color:var(--teal);}

/* BOXES */
.card{background:white;border-radius:11px;padding:1.35rem;margin-bottom:.9rem;box-shadow:0 2px 8px rgba(0,0,0,.06);border:1px solid #e2e8f0;}
.hbox{background:linear-gradient(135deg,rgba(2,175,185,.08),rgba(2,175,185,.02));border-left:4px solid var(--teal);border-radius:0 11px 11px 0;padding:.9rem 1.35rem;margin:.9rem 0;}
.wbox{background:linear-gradient(135deg,rgba(245,158,11,.1),rgba(245,158,11,.03));border-left:4px solid var(--amber);border-radius:0 11px 11px 0;padding:.9rem 1.35rem;margin:.9rem 0;}
.sbox{background:linear-gradient(135deg,rgba(34,197,94,.08),rgba(34,197,94,.02));border-left:4px solid #22c55e;border-radius:0 11px 11px 0;padding:.9rem 1.35rem;margin:.9rem 0;}
.etip{background:linear-gradient(135deg,rgba(245,158,11,.12),rgba(245,158,11,.04));border:1px solid rgba(245,158,11,.3);border-radius:9px;padding:.9rem 1.1rem;margin:.9rem 0;font-size:.85rem;line-height:1.6;}
.etip::before{content:"Exam Tip: ";font-weight:700;color:var(--amber);}

/* FLIP CARDS */
.fgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:.85rem;margin:.9rem 0;}
.fhint{text-align:center;color:#64748b;font-size:.73rem;margin-bottom:.4rem;font-style:italic;}
.fc{perspective:900px;height:148px;cursor:pointer;}
.fi{position:relative;width:100%;height:100%;transition:transform .55s;transform-style:preserve-3d;}
.fc.flipped .fi{transform:rotateY(180deg);}
.ff,.fb{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:11px;padding:.9rem;display:flex;align-items:center;justify-content:center;text-align:center;}
.ff{background:linear-gradient(135deg,var(--deep-blue),#2d5aba);color:white;}
.ff h3{font-family:Georgia,serif;font-size:.95rem;}
.fb{background:linear-gradient(135deg,var(--teal),var(--teal-dark));color:white;transform:rotateY(180deg);font-size:.78rem;line-height:1.5;padding:1rem;}

/* ACCORDION */
.accordion{border:1px solid #e2e8f0;border-radius:9px;overflow:hidden;margin:.65rem 0;}
.ah{background:#f8fafc;padding:.8rem 1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:space-between;font-weight:600;font-size:.84rem;color:var(--deep-blue);border:none;width:100%;text-align:left;font-family:inherit;transition:background .2s;}
.ah:hover{background:#f1f5f9;}
.ai{transition:transform .3s;font-size:.8rem;}
.ah.open .ai{transform:rotate(45deg);}
.ab{max-height:0;overflow:hidden;transition:max-height .4s ease;background:white;}
.ab.open{max-height:2000px;}
.abi{padding:.9rem 1.1rem;}

/* TABLES */
.tbl{width:100%;border-collapse:collapse;margin:.9rem 0;font-size:.82rem;border-radius:9px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.tbl th{background:var(--deep-blue);color:white;padding:.65rem .9rem;text-align:left;font-weight:600;}
.tbl td{padding:.6rem .9rem;border-bottom:1px solid #f1f5f9;color:#334155;vertical-align:top;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:nth-child(even) td{background:#f8fafc;}
.tbl tr:hover td{background:var(--teal-light);}

/* COMPARE GRID */
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:.9rem;margin:.9rem 0;}
.cbox{background:white;border-radius:11px;padding:1.1rem;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.cbox h4{font-weight:700;margin-bottom:.65rem;padding-bottom:.4rem;border-bottom:2px solid;}
.cbox.left h4{color:var(--deep-blue);border-color:var(--deep-blue);}
.cbox.right h4{color:var(--teal);border-color:var(--teal);}

/* PROCESS FLOW */
.pflow{display:flex;flex-wrap:wrap;gap:.4rem;align-items:center;margin:.9rem 0;}
.pstep{background:linear-gradient(135deg,var(--deep-blue),#2d5aba);color:white;padding:.5rem .85rem;border-radius:7px;font-size:.75rem;font-weight:600;text-align:center;}
.parr{color:var(--teal);font-weight:700;font-size:1.1rem;}

/* TIMELINE */
.timeline{position:relative;padding-left:1.8rem;margin:.9rem 0;}
.timeline::before{content:"";position:absolute;left:7px;top:0;bottom:0;width:2px;background:linear-gradient(to bottom,var(--teal),var(--deep-blue));}
.tli{position:relative;margin-bottom:1.25rem;}
.tld{position:absolute;left:-1.6rem;top:.2rem;width:13px;height:13px;border-radius:50%;background:var(--teal);border:2px solid white;box-shadow:0 0 0 2px var(--teal);}
.tlc{background:white;border-radius:9px;padding:.65rem .9rem;box-shadow:0 2px 8px rgba(0,0,0,.05);}
.tly{font-weight:700;color:var(--teal-dark);font-size:.77rem;}
.tlt{font-size:.845rem;color:#334155;margin-top:.2rem;line-height:1.5;}

/* QUIZ */
.qwrap{background:white;border-radius:14px;padding:1.35rem;box-shadow:0 4px 16px rgba(0,0,0,.08);margin-top:1.75rem;border:1px solid #e2e8f0;}
.qtitle{font-family:Georgia,serif;color:var(--deep-blue);margin-bottom:.9rem;font-size:1.05rem;}
.qqt{font-weight:600;font-size:.875rem;color:#1e293b;margin-bottom:.65rem;line-height:1.5;}
.qopts{display:flex;flex-direction:column;gap:.35rem;margin-bottom:.65rem;}
.qopt{padding:.55rem .9rem;border-radius:7px;border:1.5px solid #e2e8f0;cursor:pointer;font-size:.845rem;color:#334155;transition:all .2s;background:white;text-align:left;font-family:inherit;}
.qopt:hover:not(:disabled){border-color:var(--teal);background:var(--teal-light);}
.qopt.correct{background:rgba(34,197,94,.1);border-color:#22c55e;color:#15803d;font-weight:600;}
.qopt.reveal{background:rgba(34,197,94,.04);border-color:#86efac;color:#15803d;}
.qexp{font-size:.8rem;color:#475569;padding:.45rem .7rem;background:#f8fafc;border-radius:6px;display:none;line-height:1.5;margin-bottom:.5rem;}
.qbtn{background:var(--teal);color:white;border:none;padding:.6rem 1.75rem;border-radius:25px;cursor:pointer;font-weight:700;font-size:.845rem;transition:all .3s;font-family:inherit;}
.qbtn:hover{background:var(--teal-dark);}

/* COMPLETE BUTTON */
.cbtn{background:none;border:2px solid var(--teal);color:var(--teal);padding:.45rem 1.4rem;border-radius:25px;cursor:pointer;font-weight:600;font-size:.83rem;transition:all .3s;font-family:inherit;margin-top:1.75rem;}
.cbtn:hover{background:var(--teal);color:white;}
.cbtn.done{background:#22c55e;border-color:#22c55e;color:white;}

@media(max-width:768px){
  #sidebar{width:256px;position:absolute;z-index:100;height:calc(100vh - 54px);}
  .cgrid{grid-template-columns:1fr;}
  .fgrid{grid-template-columns:repeat(2,1fr);}
  #content{padding:1rem;}
}
</style>
</head>
<body>

<!-- LANDING -->
<div id="landing">
  <div id="stars"></div>
  <div style="position:relative;z-index:10;text-align:center;padding:1.5rem 2rem;">
    <div style="position:relative;display:inline-block;margin-bottom:1.5rem;">
      <div class="pring" style="width:110px;height:110px;top:50%;left:50%;transform:translate(-50%,-50%);"></div>
      <div class="pring" style="width:110px;height:110px;top:50%;left:50%;transform:translate(-50%,-50%);animation-delay:1.2s;"></div>
      <div style="width:72px;height:72px;background:linear-gradient(135deg,#02AFB9,#018a93);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.8rem;box-shadow:0 0 40px rgba(2,175,185,.5);">&#x1F4CA;</div>
    </div>
    <div class="gtext">Welcome to MyCPA</div>
    <div style="color:rgba(255,255,255,.68);font-size:clamp(.95rem,2vw,1.15rem);margin-top:.6rem;">Master Auditing and Assurance</div>
    <div style="color:rgba(2,175,185,.85);font-size:.82rem;letter-spacing:.15em;text-transform:uppercase;margin-top:.2rem;margin-bottom:1.8rem;">CPA Intermediate Level &middot; KASNEB</div>
    <div style="display:flex;gap:1.75rem;justify-content:center;align-items:center;flex-wrap:wrap;margin-bottom:2rem;">
      <div class="lstat"><div class="lstat-n" style="color:#02AFB9;">10</div><div class="lstat-l">Topics</div></div>
      <div class="lsep"></div>
      <div class="lstat"><div class="lstat-n" style="color:#F59E0B;">44</div><div class="lstat-l">Subtopics</div></div>
      <div class="lsep"></div>
      <div class="lstat"><div class="lstat-n" style="color:#7ef9ff;">6+</div><div class="lstat-l">Quiz Questions</div></div>
    </div>
    <button class="gsBtn" onclick="startApp()">Get Started &#x2192;</button>
    <div style="margin-top:1.2rem;color:rgba(255,255,255,.3);font-size:.75rem;">Revised September 2021 &middot; KASNEB Curriculum</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div id="topbar">
    <button id="sbtoggle" onclick="toggleSidebar()">&#9776;</button>
    <div class="toplogo">MyCPA <span>Audit</span></div>
    <div style="flex:1;"></div>
    <div style="display:flex;align-items:center;gap:.6rem;flex-shrink:0;">
      <div id="pbwrap"><div id="pbar"></div></div>
      <span class="ptxt" id="ptxt">0 / 0</span>
      <button class="nbtn" onclick="navPrev()">&#8592; Prev</button>
      <button class="nbtn" onclick="navNext()">Next &#8594;</button>
    </div>
  </div>
  <div id="bodywrap">
    <div id="sidebar">
      <div class="sb-hdr"><h2>Course Topics</h2></div>
      <div id="sbnav"></div>
    </div>
    <div id="content">
      <div id="pgcont"></div>
    </div>
  </div>
</div>


<script>
var PAGES = {};
PAGES["t1s1"] = "<div class='page-hero'><span class='badge'>Topic 1</span><h1>Definition and Objectives of Assurance Engagements</h1><p>Understanding what assurance means, why it matters, and the objectives of the practitioner.</p></div><h2 class='sec'>What is Assurance?</h2><p class='cp'><b>Assurance</b> is the expression of a conclusion intended to increase the confidence that users can place in a given subject matter or information. An auditors report is a prime example.</p><div class='hbox'><b>Audit Engagement Defined:</b> A professional negotiation between a prospective customer and a public accounting entity, specifying scope and purpose of audit work.</div><h2 class='sec'>Three Core Objectives of the Practitioner</h2><div class='card'><ol class='cl'><li>Obtain assurance (reasonable or limited) that subject matter information is free from material misstatement</li><li>Express a conclusion through a written report conveying the level and basis of assurance</li><li>Communicate further as required by relevant ISAEs</li></ol></div><div class='etip'>If reasonable or limited assurance cannot be obtained, the practitioner must disclaim a conclusion or withdraw from the engagement.</div><h2 class='sec'>Engagement Process Flow</h2><div class='pflow'><div class='pstep'>Engagement Letter</div><div class='parr'>to</div><div class='pstep'>Planning</div><div class='parr'>to</div><div class='pstep'>Control Testing</div><div class='parr'>to</div><div class='pstep'>Draft Report</div><div class='parr'>to</div><div class='pstep'>Final Report</div></div><div class='qwrap'><h3 class='qtitle'>Quick Check</h3><div class='qq' data-answer='B'><p class='qqt'>What is the PRIMARY objective of an assurance practitioner?</p><div class='qopts'><button class='qopt' data-letter='A'>A. To prepare the financial statements for the client</button><button class='qopt' data-letter='B'>B. To obtain reasonable or limited assurance that subject matter information is free from material misstatement</button><button class='qopt' data-letter='C'>C. To detect all instances of fraud in the organization</button><button class='qopt' data-letter='D'>D. To certify the absolute accuracy of financial statements</button></div><p class='qexp'>The practitioner obtains assurance (not absolute certainty) that information is free from material misstatement, then communicates this through a written report.</p><button class='qbtn' onclick='checkAnswer(this)'>Submit Answer</button></div></div>";
PAGES["t1s2"] = "<div class='page-hero'><span class='badge'>Topic 1</span><h1>Elements of an Assurance Engagement</h1><p>Five essential elements must ALL be present for an engagement to qualify as assurance.</p></div><h2 class='sec'>The Five Essential Elements</h2><div class='card'><ol class='cl'><li>Three-party relationship - Practitioner, responsible party, and intended users</li><li>Appropriate subject matter - Identifiable, measurable, capable of yielding evidence</li><li>Suitable criteria - Standards against which subject matter is evaluated</li><li>Sufficient appropriate evidence - Enough quality evidence to support the conclusion</li><li>Written assurance report - Clear expression of conclusion</li></ol></div><h2 class='sec'>Sufficiency vs Appropriateness</h2><p class='fhint'>Click the cards to flip them</p><div class='fgrid'><div class='fc' onclick='this.classList.toggle(\"flipped\")'><div class='fi'><div class='ff'><h3>Sufficiency</h3></div><div class='fb'>The QUANTITY of evidence needed. Higher risk of material misstatement means more evidence is required.</div></div></div><div class='fc' onclick='this.classList.toggle(\"flipped\")'><div class='fi'><div class='ff'><h3>Appropriateness</h3></div><div class='fb'>The QUALITY of evidence - its relevance and reliability. Reliability depends on source, nature, and circumstances.</div></div></div><div class='fc' onclick='this.classList.toggle(\"flipped\")'><div class='fi'><div class='ff'><h3>Most Reliable Evidence</h3></div><div class='fb'>Evidence from independent external sources, in documentary form, obtained directly by the practitioner.</div></div></div></div><h2 class='sec'>Suitable Criteria - Five Characteristics (RCRUN)</h2><table class='tbl'><tr><th>Characteristic</th><th>Meaning</th></tr><tr><td><b>Relevance</b></td><td>Contributes to conclusions useful for decision-making</td></tr><tr><td><b>Completeness</b></td><td>No relevant factors affecting conclusions omitted</td></tr><tr><td><b>Reliability</b></td><td>Allows consistent evaluation by similarly qualified practitioners</td></tr><tr><td><b>Understandability</b></td><td>Clear, comprehensive, not subject to significantly different interpretations</td></tr><tr><td><b>Neutrality</b></td><td>Free from bias</td></tr></table><div class='etip'>Remember RCRUN: Relevance, Completeness, Reliability, Understandability, Neutrality for criteria characteristics.</div>";
PAGES["t1s3"] = "<div class='page-hero'><span class='badge'>Topic 1</span><h1>Types and Levels of Assurance</h1><p>Understanding reasonable vs limited assurance and positive vs negative expression.</p></div><p class='fhint'>Click these cards to compare assurance types</p><div class='fgrid'><div class='fc' onclick='this.classList.toggle(\"flipped\")'><div class='fi'><div class='ff'><h3>Reasonable Assurance</h3></div><div class='fb'>High but not absolute. Expressed in POSITIVE form: In our opinion, the financial statements present fairly. Example: Audit of historical financial statements.</div></div></div><div class='fc' onclick='this.classList.toggle(\"flipped\")'><div class='fi'><div class='ff'><h3>Limited Assurance</h3></div><div class='fb'>Lower level. Expressed in NEGATIVE form: Nothing has come to our attention to cause us to believe that. Example: Review of financial statements.</div></div></div></div><h2 class='sec'>Types by Structure</h2><div class='cgrid'><div class='cbox left'><h4>Assertion-Based</h4><p class='cp'>The responsible party evaluates the subject matter; their assertion is available to intended users. The practitioner provides assurance on that assertion.</p><p class='cp'>Example: Management prepares financial statements - auditor audits them.</p></div><div class='cbox right'><h4>Direct Reporting</h4><p class='cp'>The practitioner directly performs the evaluation. The practitioner conclusion IS the subject matter information.</p><p class='cp'>Example: Practitioner directly evaluates effectiveness of controls.</p></div></div><h2 class='sec'>Other Engagement Types</h2><table class='tbl'><tr><th>Type</th><th>Level of Assurance</th><th>Form of Expression</th></tr><tr><td>Review Engagement</td><td>Moderate (limited)</td><td>Negative - nothing came to attention</td></tr><tr><td>Agreed-Upon Procedures</td><td>No assurance expressed</td><td>Report of factual findings only</td></tr><tr><td>Compilation</td><td>No assurance expressed</td><td>Accountant prepares; no audit conclusion</td></tr></table><div class='etip'>The key differentiator between reasonable and limited assurance is the FORM of expression: POSITIVE language vs NEGATIVE language. Frequently tested!</div>";
PAGES["t1s4"] = "<div class='page-hero'><span class='badge'>Topic 1</span><h1>Non-Assurance Engagements</h1><p>Engagements that lack one or more of the five assurance elements.</p></div><div class='hbox'><b>Definition:</b> If an engagement lacks any of the five elements of an assurance engagement, it is classified as a non-assurance engagement (residual definition).</div><h2 class='sec'>Examples of Non-Assurance Engagements</h2><div class='card'><ol class='cl'><li>Agreed-upon procedures engagements</li><li>Compilation engagements</li><li>Preparation of income tax returns where no assurance conclusion is expressed</li><li>Management advisory services and consulting</li><li>Professional opinions not intended to be assurance reports</li></ol></div><h2 class='sec'>Modified Conclusions in Assurance Reports</h2><table class='tbl'><tr><th>Circumstance</th><th>Modification Type</th></tr><tr><td>Limitation on scope - moderate</td><td>Qualified conclusion</td></tr><tr><td>Limitation on scope - severe or pervasive</td><td>Disclaimer of conclusion</td></tr><tr><td>Subject matter information incorrect - moderate</td><td>Qualified conclusion (except for)</td></tr><tr><td>Subject matter information incorrect - severe or pervasive</td><td>Adverse conclusion</td></tr></table><div class='etip'>A qualified conclusion is expressed as except for the effects of meaning all other aspects are fine except the specified matter.</div>";
PAGES["t2s1"] = "<div class='page-hero'><span class='badge'>Topic 2</span><h1>Definition and Objectives of an Audit</h1><p>The fundamental nature, purpose, and scope of an independent audit.</p></div><h2 class='sec'>Definition of an Audit</h2><div class='hbox'><p class='cp'>An audit is the independent examination of and expression of opinion on the financial statements of an economic entity by an appointed auditor, in pursuance of that appointment and in compliance with any relevant statutory obligation.</p></div><p class='fhint'>Click cards to explore key audit concepts</p><div class='fgrid'><div class='fc' onclick='this.classList.toggle(\"flipped\")'><div class='fi'><div class='ff'><h3>Independence</h3></div><div class='fb'>Essential to audit value. Without independence, the audit opinion has no credibility. Independence is both a matter of fact AND appearance.</div></div></div><div class='fc' onclick='this.classList.toggle(\"flipped\")'><div class='fi'><div class='ff'><h3>Opinion</h3></div><div class='fb'>Not a guarantee. One auditor may disagree with another. Judgment is essential - there are no certainties.</div></div></div><div class='fc' onclick='this.classList.toggle(\"flipped\")'><div class='fi'><div class='ff'><h3>True and Fair View</h3></div><div class='fb'>Financial statements show a true and fair view if they are complete within materiality, use suitable policies, are free from bias, and comply with the Companies Act and IFRS.</div></div></div></div><h2 class='sec'>Users of Audited Financial Statements</h2><table class='tbl'><tr><th>User Group</th><th>Primary Interest</th></tr><tr><td>Present and Potential Investors</td><td>Buy/hold/sell decisions; risk assessment</td></tr><tr><td>Employees and Trade Unions</td><td>Stability, profitability, remuneration ability</td></tr><tr><td>Lenders</td><td>Loan and interest repayment capacity</td></tr><tr><td>Suppliers and Trade Creditors</td><td>Whether amounts owing will be paid</td></tr><tr><td>Government</td><td>Resource allocation, taxation, regulatory compliance</td></tr><tr><td>General Public</td><td>Economic contribution, employment, trends</td></tr></table>";
PAGES["t2s2"] = "<div class='page-hero'><span class='badge'>Topic 2</span><h1>Stages of an Audit</h1><p>A structured four-stage approach to gathering sufficient, reliable evidence for the audit opinion.</p></div><h2 class='sec'>Four Audit Stages</h2><div class='pflow'><div class='pstep'>1. Preliminary Engagement</div><div class='parr'>to</div><div class='pstep'>2. Planning</div><div class='parr'>to</div><div class='pstep'>3. Execution</div><div class='parr'>to</div><div class='pstep'>4. Review and Completion</div></div><div class='accordion'><button class='ah' onclick='toggleAcc(this)'>Stage 1: Preliminary Engagement Activities <span class='ai'>+</span></button><div class='ab'><div class='abi'><ul class='cl'><li>Client acceptance and continuation procedures carried out</li><li>Terms of engagement agreed in writing</li><li>Quality control aspects reviewed including competency of team and independence</li></ul></div></div></div><div class='accordion'><button class='ah' onclick='toggleAcc(this)'>Stage 2: Planning <span class='ai'>+</span></button><div class='ab'><div class='abi'><ul class='cl'><li>Identifying the scope of the assignment</li><li>Developing an audit strategy considering business environment, scope, reporting objectives, internal control, fraud risk, materiality</li><li>Developing an overall audit plan specifying nature, timing, and extent of procedures</li><li>Ascertaining nature and extent of resources required</li></ul></div></div></div><div class='accordion'><button class='ah' onclick='toggleAcc(this)'>Stage 3: Execution <span class='ai'>+</span></button><div class='ab'><div class='abi'><ul class='cl'><li>Tests of controls and substantive tests on transactions and balances</li><li>Substantive analytical procedures</li><li>Evaluation of significant assumptions in fair value measurements</li><li>Identification of related parties and testing related party transactions</li><li>Documenting nature, timing, extent of procedures, results, and conclusions</li></ul></div></div></div><div class='accordion'><button class='ah' onclick='toggleAcc(this)'>Stage 4: Review and Completion <span class='ai'>+</span></button><div class='ab'><div class='abi'><ul class='cl'><li>All outstanding matters cleared</li><li>Final analytical procedures performed on financial statements as a whole</li><li>Written management representations obtained</li><li>Going concern reviewed</li><li>Subsequent events procedures up to audit report date</li><li>Engagement quality control review where applicable</li><li>Engagement partner reviews file and signs off</li></ul></div></div></div><div class='hbox' style='margin-top:1.5rem;'><b>Key Principle:</b> Audit evidence is persuasive rather than conclusive. Absolute certainty is rarely obtainable.</div>";
PAGES["t2s3"] = "<div class='page-hero'><span class='badge'>Topic 2</span><h1>Development of Auditing</h1><p>How auditing evolved from simple checking activities to the modern risk-based approach.</p></div><h2 class='sec'>The Audit Expectation Gap</h2><div class='wbox'><b>Expectation Gap:</b> The gap between what external auditors understand their role to be and what the public expects. Society often incorrectly expects auditors to detect and prevent ALL fraud and guarantee solvency.</div><h2 class='sec'>Historical Timeline</h2><div class='timeline'><div class='tli'><div class='tld'></div><div class='tlc'><div class='tly'>Prior to 1840 - Ancient Beginnings</div><div class='tlt'>Checking activities found in ancient China, Egypt, Greece. In England, auditors appointed to check state revenue under King Henry I. Primary aim: prevent fraudulent actions.</div></div></div><div class='tli'><div class='tld'></div><div class='tlc'><div class='tly'>1840s-1920s - Industrial Revolution</div><div class='tlt'>Joint Stock Companies Act 1844. Annual statutory audit made compulsory 1900. Focus: complete checking of transactions to protect shareholders.</div></div></div><div class='tli'><div class='tld'></div><div class='tlc'><div class='tly'>1920s-1960s - USA Dominance</div><div class='tlt'>Post-1929 Wall Street Crash. Concepts of materiality and sampling introduced. Shift from fraud detection to adding credibility to financial statements.</div></div></div><div class='tli'><div class='tld'></div><div class='tlc'><div class='tly'>1960s-1990s - Systems Era</div><div class='tlt'>Shift from verifying transactions to relying on systems. Reliance on internal control. Development of risk-based auditing in mid-1980s. CAATs introduced.</div></div></div><div class='tli'><div class='tld'></div><div class='tlc'><div class='tly'>1990s-Present - Business Risk Era</div><div class='tlt'>Business risk approach - broader perspective understanding all client risks. Increased responsibility for fraud detection. Governance focus. User needs increasingly prominent.</div></div></div></div><div class='etip'>The evolution: (1) Fraud detection, (2) Credibility of statements, (3) Systems-based, (4) Risk-based, (5) Business risk approach. This progression is frequently examined.</div>";
PAGES["t2s4"] = "<div class='page-hero'><span class='badge'>Topic 2</span><h1>Types of Audits and Limitations</h1><p>Classification by nature of work, approach, and the inherent limitations of any audit.</p></div><h2 class='sec'>Statutory vs Private Audits</h2><div class='cgrid'><div class='cbox left'><h4>Statutory Audits</h4><ul class='cl'><li>Required by law - Companies Act Cap 486</li><li>All public limited companies must undergo this</li><li>Rights and duties laid down by statute</li><li>Appointment powers vest in shareholders</li></ul></div><div class='cbox right'><h4>Private Audits</h4><ul class='cl'><li>Not governed by statute</li><li>For NGOs, partnerships, clubs</li><li>Appointment by private contract</li><li>Scope determined by agreed terms</li></ul></div></div><h2 class='sec'>Classification by Timing</h2><table class='tbl'><tr><th>Type</th><th>Description</th><th>Advantages</th><th>Disadvantages</th></tr><tr><td><b>Continuous Audit</b></td><td>Throughout financial period at predetermined intervals</td><td>Errors found early; better audit reports</td><td>Expensive; frequent interruptions</td></tr><tr><td><b>Interim Audit</b></td><td>Halfway through financial period</td><td>Cheaper than continuous</td><td>Limited coverage</td></tr><tr><td><b>Final Audit</b></td><td>End of financial year</td><td>Standard approach for most entities</td><td>Concentrated effort at year-end</td></tr></table><h2 class='sec'>Internal vs External Audit</h2><table class='tbl'><tr><th>Aspect</th><th>Internal Audit</th><th>External Audit</th></tr><tr><td>Objective</td><td>Advise management on sound internal controls; add value</td><td>True and fair view opinion</td></tr><tr><td>Legal Basis</td><td>Not required by law</td><td>Legal requirement for limited companies</td></tr><tr><td>Scope</td><td>All areas: operational and financial</td><td>Purely financial focus</td></tr></table><h2 class='sec'>Limitations of an Audit</h2><div class='wbox'><ul class='cl'><li>Risk of undetected misstatements exists even with a properly conducted audit</li><li>Fraud is harder to detect than errors as it is deliberately concealed</li><li>Auditor relies on management representations as truthful unless evidence contradicts</li><li>Sampling means not all transactions are examined</li><li>Strong internal control systems still have inherent limitations</li></ul></div>";
PAGES["t2s5"] = "<div class='page-hero'><span class='badge'>Topic 2</span><h1>Risk, Materiality and Assertions</h1><p>The fundamental frameworks auditors use to focus their work effectively.</p></div><h2 class='sec'>Materiality (ISA 320)</h2><div class='hbox'><b>IAASB Definition:</b> Information is material if its omission or misstatement could influence the decisions of users taken on the basis of the financial statements. Materiality provides a threshold or cut-off point.</div><div class='card'><div class='ssec'>Qualitative Factors in Materiality Judgment:</div><ol class='cl'><li>Inadequate or inaccurate descriptions of accounting policies</li><li>Cumulative effect of small amounts over time</li><li>Relativity - Ksh 100,000 material to a small company but not a large one</li><li>Degree of latitude allowable - exact vs estimated items</li><li>Aggregate uncorrected misstatements assessed against materiality as a whole</li></ol></div><div class='etip'>US SEC benchmark: Errors over 10% are material; 5-10% may be material; below 5% are not material. This may be referenced in exam scenarios.</div><h2 class='sec'>Financial Statement Assertions</h2><div class='accordion'><button class='ah' onclick='toggleAcc(this)'>Assertions - Classes of Transactions (OACCC) <span class='ai'>+</span></button><div class='ab'><div class='abi'><table class='tbl'><tr><th>Assertion</th><th>Meaning</th></tr><tr><td><b>Occurrence</b></td><td>Transactions recorded actually occurred and relate to the entity</td></tr><tr><td><b>Completeness</b></td><td>All transactions that should be recorded have been recorded</td></tr><tr><td><b>Accuracy</b></td><td>Transactions recorded at correct amounts</td></tr><tr><td><b>Cut-off</b></td><td>Transactions recorded in the correct accounting period</td></tr><tr><td><b>Classification</b></td><td>Transactions recorded in the appropriate accounts</td></tr></table></div></div></div><div class='accordion'><button class='ah' onclick='toggleAcc(this)'>Assertions - Account Balances (ERCV) <span class='ai'>+</span></button><div class='ab'><div class='abi'><table class='tbl'><tr><th>Assertion</th><th>Meaning</th></tr><tr><td><b>Existence</b></td><td>Assets and liabilities exist at the reporting date</td></tr><tr><td><b>Rights and Obligations</b></td><td>Entity has rights to assets; liabilities are genuine obligations</td></tr><tr><td><b>Completeness</b></td><td>All assets, liabilities, and equity that should be recorded are recorded</td></tr><tr><td><b>Valuation</b></td><td>Assets and liabilities recorded at appropriate carrying amounts</td></tr></table></div></div></div><div class='accordion'><button class='ah' onclick='toggleAcc(this)'>Assertions - Presentation and Disclosure <span class='ai'>+</span></button><div class='ab'><div class='abi'><table class='tbl'><tr><th>Assertion</th><th>Meaning</th></tr><tr><td><b>Occurrence</b></td><td>Disclosed events have occurred and relate to the entity</td></tr><tr><td><b>Completeness</b></td><td>All required disclosures are included</td></tr><tr><td><b>Classification and Understandability</b></td><td>Information is fairly presented and clearly described</td></tr><tr><td><b>Accuracy and Valuation</b></td><td>Information disclosed at appropriate amounts</td></tr></table></div></div></div><div class='qwrap'><h3 class='qtitle'>Test Your Knowledge</h3><div class='qq' data-answer='D'><p class='qqt'>An auditor who wants to verify that all sales transactions for the year have been recorded is testing which assertion?</p><div class='qopts'><button class='qopt' data-letter='A'>A. Existence</button><button class='qopt' data-letter='B'>B. Accuracy</button><button class='qopt' data-letter='C'>C. Cut-off</button><button class='qopt' data-letter='D'>D. Completeness</button></div><p class='qexp'>Completeness tests whether all transactions that SHOULD be recorded HAVE been recorded. The risk is understatement. Existence tests whether recorded items actually exist (risk of overstatement).</p><button class='qbtn' onclick='checkAnswer(this)'>Submit Answer</button></div></div>";
PAGES["t3s1"] = "<div class='page-hero'><span class='badge'>Topic 3</span><h1>Auditor Liability</h1><p>Civil and criminal liability, and landmark case law shaping auditor duties to third parties.</p></div><h2 class='sec'>Civil Liability</h2><div class='card'><p class='cp'><b>Companies Act Section 206:</b> Officers including auditors may be liable for financial damages for civil offences of misfeasance and breach of trust relevant during winding up where officers have misused authority for personal gain.</p></div><h2 class='sec'>Criminal Liability</h2><div class='wbox'><b>Companies Act Section 46:</b> An auditor is criminally liable if they willfully make a materially false statement in any report or certificate with intent to deceive. Conviction may result in up to 7 years imprisonment.<br><br>Criminal offences include: advising a client to commit a criminal offence; aiding in devising a crime; agreeing to conceal evidence; knowing of an arrestable offence and impeding arrest; accepting consideration to withhold information; knowing of treason and failing to report it.</div><h2 class='sec'>Landmark Cases</h2><div class='accordion'><button class='ah' onclick='toggleAcc(this)'>Caparo Industries v Dickman (1990) <span class='ai'>+</span></button><div class='ab'><div class='abi'><p class='cp'>Caparo purchased Fidelity plc shares relying on accounts audited by Touche Ross. Claim was unsuccessful. The House of Lords held accounts were prepared for existing shareholders as a class - auditor had no reasonable knowledge of the purpose to which Caparo would put the accounts.</p><div class='sbox'><b>Three-Part Test for Duty of Care (Caparo):</b><ol class='cl'><li>Loss suffered is a reasonably foreseeable consequence of defendant conduct</li><li>Sufficient proximity of relationship between defendant and claimant</li><li>It is fair, just and reasonable to impose liability</li></ol></div></div></div></div><div class='accordion'><button class='ah' onclick='toggleAcc(this)'>RBS v Bannerman Johnstone MacLay (2002) <span class='ai'>+</span></button><div class='ab'><div class='abi'><p class='cp'>RBS lost over 13 million GBP in unpaid overdrafts to insolvent APC Ltd. Bannerman audited APC financial statements and through the banking facility letter would have known RBS relied on the accounts for lending decisions.</p><div class='sbox'><b>Outcome:</b> Bannerman owed RBS a duty of care. Key factor: absence of any disclaimer of liability to third parties.</div></div></div></div><div class='accordion'><button class='ah' onclick='toggleAcc(this)'>Other Key Cases <span class='ai'>+</span></button><div class='ab'><div class='abi'><ul class='cl'><li><b>Candler v Crane Christmas:</b> Majority held no liability without contractual relationship even when investor relied on negligently prepared accounts</li><li><b>Hedley Byrne v Heller and Partners:</b> Distinguished Candler - bank certificate issued in ordinary course of business; reliance foreseeable; no contract not a valid defence</li><li><b>Jeb Fasteners v Marks Bloom:</b> Duty of care owed; accounts negligently prepared; BUT judgment for defendant because plaintiff would have acted the same even with accurate accounts</li></ul></div></div></div><div class='etip'>The Caparo three-part test is THE standard for establishing auditor duty of care to third parties. Memorize all three elements.</div>";
PAGES["t3s2"] = "<div class='page-hero'><span class='badge'>Topic 3</span><h1>Appointment, Rights and Duties of Auditors</h1><p>Statutory provisions governing how auditors are appointed, paid, and removed under the Companies Act.</p></div><h2 class='sec'>Appointment of Auditors</h2><div class='card'><ul class='cl'><li>Every company must appoint auditors at each Annual General Meeting (AGM)</li><li>A retiring auditor is deemed reappointed without resolution unless not qualified, resolution appoints someone else, or written notice of unwillingness</li><li>If no auditors appointed at AGM, the Registrar may appoint</li><li>First auditors may be appointed by directors any time before the first AGM</li><li>Directors may fill casual vacancies</li></ul></div><h2 class='sec'>Disqualifications</h2><div class='wbox'><ul class='cl'><li>An officer or servant of the company</li><li>A person who is a partner of or employed by an officer or servant of the company</li><li>A body corporate except for private companies in certain cases</li><li>Any person not holding a practising certificate from the Accountants Act</li></ul></div><h2 class='sec'>Rights of Auditors</h2><div class='hbox'><ul class='cl'><li><b>Right of access</b> at all times to books, accounts, and vouchers</li><li><b>Right to require information</b> and explanations from officers</li><li><b>Right to attend</b> any general meeting and receive all notices</li><li><b>Right to be heard</b> at general meetings on matters concerning them as auditors</li><li>Auditors report shall be read before the company in general meeting</li></ul></div><div class='etip'>Auditors have a RIGHT to attend general meetings - this is not optional. This protects them and allows them to speak on audit-related matters.</div>";
PAGES["t3s3"] = "<div class='page-hero'><span class='badge'>Topic 3</span><h1>ISAs, IESBA Code and ICPAK</h1><p>The international and national standards framework governing auditing practice in Kenya.</p></div><h2 class='sec'>International Standards on Auditing (ISAs)</h2><div class='card'><ul class='cl'><li>Applied in the audit of historical financial information</li><li>Written in context of independent auditor auditing financial statements</li><li>Auditors must know IAS/IFRS in detail - compliance assessed as part of forming the true and fair view opinion</li></ul></div><h2 class='sec'>IESBA</h2><div class='hbox'><p class='cp'>An independent standard-setting body that sets high-quality ethical standards for professional accountants worldwide. Develops the Code of Ethics for Professional Accountants.</p><p class='cp'><b>IESBA has 18 members</b> (chairman plus 17 volunteers from IFAC member bodies). Approved by 2/3 majority vote. Overseen by the Public Interest Oversight Board (PIOB).</p></div><h2 class='sec'>Standard-Setting Process</h2><div class='pflow'><div class='pstep'>Research and Consultation</div><div class='parr'>to</div><div class='pstep'>Transparent Debate</div><div class='parr'>to</div><div class='pstep'>Public Exposure min 90 days</div><div class='parr'>to</div><div class='pstep'>Consider Comments</div><div class='parr'>to</div><div class='pstep'>2/3 Affirmative Vote</div></div><h2 class='sec'>ICPAK - The Kenyan Regulatory Body</h2><div class='card'><p class='cp'><b>Institute of Certified Public Accountants of Kenya (ICPAK)</b> is the statutory body mandated to develop and regulate the accountancy profession in Kenya.</p><ul class='cl'><li>Setting and enforcing professional standards</li><li>Enforcing quality assurance programmes for audit</li><li>Monitoring ethical behavior through the Statutory Disciplinary Committee</li><li>Maintaining competence through CPE publications and programs</li><li>Advising the Minister on financial accountability matters</li><li>International memberships: IFAC and ECSAFA</li></ul></div>";
PAGES["t3s4"] = "<div class='page-hero'><span class='badge'>Topic 3</span><h1>Fundamental Ethics Principles and Threats</h1><p>The five fundamental principles and the framework for identifying and addressing threats to compliance.</p></div><h2 class='sec'>Five Fundamental Principles (I-O-P-C-P)</h2><p class='fhint'>Click each card to learn more</p><div class='fgrid'><div class='fc' onclick='this.classList.toggle(\"flipped\")'><div class='fi'><div class='ff'><h3>1. Integrity</h3></div><div class='fb'>Be straightforward and honest in all professional and business relationships. Fair dealing and truthfulness. Never associate with false or misleading information.</div></div></div><div class='fc' onclick='this.classList.toggle(\"flipped\")'><div class='fi'><div class='ff'><h3>2. Objectivity</h3></div><div class='fb'>Never allow bias, conflict of interest, or undue influence to override professional judgment. Independence of mind - having regard only to relevant considerations.</div></div></div><div class='fc' onclick='this.classList.toggle(\"flipped\")'><div class='fi'><div class='ff'><h3>3. Professional Competence</h3></div><div class='fb'>Maintain professional knowledge and skill. Act diligently in accordance with technical and professional standards. Lifelong learning obligation.</div></div></div><div class='fc' onclick='this.classList.toggle(\"flipped\")'><div class='fi'><div class='ff'><h3>4. Confidentiality</h3></div><div class='fb'>Respect confidentiality of information. Do not disclose to third parties without authority unless legally required. Do not use client information for personal advantage.</div></div></div><div class='fc' onclick='this.classList.toggle(\"flipped\")'><div class='fi'><div class='ff'><h3>5. Professional Behavior</h3></div><div class='fb'>Comply with relevant laws and regulations. Avoid any action that discredits the profession. No exaggerated claims about services or disparaging references to other firms.</div></div></div></div><h2 class='sec'>Categories of Threats (SSAFI)</h2><table class='tbl'><tr><th>Threat</th><th>Description</th><th>Example</th></tr><tr><td><b>Self-Interest</b></td><td>Financial or other interest of accountant or family</td><td>Owning shares in audit client; fear of losing client</td></tr><tr><td><b>Self-Review</b></td><td>Previous judgment needs re-evaluation</td><td>Auditing systems you designed</td></tr><tr><td><b>Advocacy</b></td><td>Promoting clients position compromises objectivity</td><td>Recommending clients shares</td></tr><tr><td><b>Familiarity</b></td><td>Too-close relationship leads to over-sympathy</td><td>Long-term client relationship</td></tr><tr><td><b>Intimidation</b></td><td>Deterred from acting objectively by threats</td><td>Client threatens to remove auditor if adverse opinion given</td></tr></table><div class='etip'>Memorize the 5 THREATS using: SSAFI - Self-interest, Self-review, Advocacy, Familiarity, Intimidation.</div>";
PAGES["t3s5"] = "<div class='page-hero'><span class='badge'>Topic 3</span><h1>Independence, Fees and Marketing</h1><p>Auditor independence requirements, fee rules, advertising restrictions, and opinion shopping.</p></div><h2 class='sec'>Independence</h2><div class='cgrid'><div class='cbox left'><h4>Independence of Mind</h4><p class='cp'>The state of mind that permits an opinion without being affected by influences that compromise professional judgment. Allows integrity, objectivity, and professional skepticism.</p></div><div class='cbox right'><h4>Independence in Appearance</h4><p class='cp'>Avoidance of facts so significant that a reasonable informed third party would conclude that objectivity or integrity was compromised - even if the auditor is actually independent.</p></div></div><div class='wbox' style='margin-top:1rem;'><b>Matters that IMPAIR Independence:</b><ul class='cl'><li>Undue dependence on an audit client proportion of fee income</li><li>Actual or threatened litigation</li><li>Family or other personal relationships</li><li>Beneficial interest in shares and other investments</li><li>Loans to or from the client</li><li>Provision of other services such as systems design that is then audited</li></ul></div><h2 class='sec'>Audit Fees</h2><div class='card'><ul class='cl'><li>Fees must NOT be charged on a percentage or contingency basis such as a bonus of 3 percent on profits</li><li>Common bases: skill and knowledge required; seniority of staff; time necessarily engaged; nature of responsibility</li><li>A fee so low it cannot support professional standards creates a self-interest threat</li></ul></div><h2 class='sec'>Opinion Shopping</h2><div class='wbox'><b>Opinion Shopping:</b> Searching for an auditor willing to support a proposed accounting treatment designed to help the company achieve its reporting objectives - even if that treatment frustrates reliable reporting.<br><br><b>Red Flag:</b> Frequent changes of auditors in client acceptance assessment can indicate opinion shopping.</div>";
PAGES["t4s1"] = "<div class='page-hero'><span class='badge'>Topic 4</span><h1>Client Acceptance and Retention</h1><p>Procedures for accepting new clients and continuing with existing ones, plus the engagement letter.</p></div><h2 class='sec'>ISA 210 - Preconditions for Accepting an Audit</h2><div class='hbox'><ul class='cl'><li>An acceptable financial reporting framework has been used</li><li>Those charged with governance acknowledge and understand their responsibilities</li></ul><p class='cp' style='margin-top:0.5rem;'>If preconditions are absent, the auditor must discuss this with governance. Unless required by law, the auditor must not accept the engagement.</p></div><h2 class='sec'>Red Flags in Client Acceptance</h2><table class='tbl'><tr><th>No.</th><th>Red Flag</th><th>Risk Implication</th></tr><tr><td>1</td><td>Frequent changes of auditors</td><td>Possible opinion shopping</td></tr><tr><td>2</td><td>Poor financial history or bankruptcy</td><td>Takes unjustifiable risks</td></tr><tr><td>3</td><td>Unstable address, employment, or professional history</td><td>Instability risk</td></tr><tr><td>4</td><td>Overly litigious - plaintiff or defendant</td><td>Risk of non-payment or disputes</td></tr><tr><td>5</td><td>High turnover in upper management</td><td>Lack of internal stability</td></tr><tr><td>6</td><td>Short operating history</td><td>Unknown management background</td></tr><tr><td>7</td><td>Foreign operations or complex structures</td><td>Possible concealment of issues</td></tr><tr><td>8</td><td>Reluctance to provide references</td><td>Likely reluctance after acceptance too</td></tr><tr><td>9</td><td>Pressure to start work quickly</td><td>Wants to prevent background checks</td></tr><tr><td>10</td><td>Recent regulatory actions</td><td>Poor internal controls or non-compliance</td></tr></table><h2 class='sec'>Engagement Letter (ISA 210)</h2><div class='accordion'><button class='ah' onclick='toggleAcc(this)'>Required Contents <span class='ai'>+</span></button><div class='ab'><div class='abi'><ul class='cl'><li>Objective and scope of the audit</li><li>Responsibilities of the auditor</li><li>Responsibilities of management</li><li>Identification of applicable financial reporting framework</li><li>Expected form and content of any reports to be issued</li><li>Fee basis and billing arrangements</li></ul></div></div></div><div class='accordion'><button class='ah' onclick='toggleAcc(this)'>When to Issue a New Engagement Letter <span class='ai'>+</span></button><div class='ab'><div class='abi'><ul class='cl'><li>Any indication client misunderstands objective or scope</li><li>Revised or special terms</li><li>Recent change in senior management or governance</li><li>Significant change in ownership</li><li>Significant change in nature or size of clients business</li><li>Legal or regulatory requirements changed</li></ul></div></div></div><div class='etip'>The professional clearance letter sent to the existing auditor before accepting is a critical step. The client must give permission for the existing auditor to share information.</div>";
PAGES["t4s2"] = "<div class='page-hero'><span class='badge'>Topic 4</span><h1>Understanding the Entity and Its Environment</h1><p>Risk assessment procedures - the foundation for identifying and assessing risks of material misstatement.</p></div><h2 class='sec'>Objective (ISA 315)</h2><div class='hbox'><b>Objective:</b> Identify and assess risks of material misstatement - whether due to fraud or error - at the financial statement and assertion levels, through understanding the entity and its environment including internal control.</div><h2 class='sec'>Risk Assessment Procedures Required</h2><div class='card'><ol class='cl'><li><b>Inquiries of management</b> and internal audit and others with relevant information</li><li><b>Analytical procedures</b> to identify unusual patterns, relationships, or transactions</li><li><b>Observation and inspection</b> of operations, documents, premises, and reports</li></ol></div><h2 class='sec'>Five Internal Control Components</h2><div class='accordion'><button class='ah' onclick='toggleAcc(this)'>The Five Components <span class='ai'>+</span></button><div class='ab'><div class='abi'><ol class='cl'><li><b>Control Environment</b> - tone at the top; integrity, ethical values, governance</li><li><b>Entity Risk Assessment Process</b> - how management identifies and responds to risks</li><li><b>Information System and Communication</b> - how transactions are recorded and reported</li><li><b>Control Activities</b> - policies and procedures ensuring directives are carried out</li><li><b>Monitoring of Controls</b> - management assessment of control effectiveness over time</li></ol></div></div></div><h2 class='sec'>Identifying Significant Risks</h2><div class='wbox'><b>Significant Risks</b> often relate to:<ul class='cl'><li>Non-routine transactions unusual due to size or nature</li><li>Judgmental matters with significant measurement uncertainty</li><li>Risks of fraud</li><li>Recent significant economic, accounting, or other developments</li><li>Complex transactions or transactions with related parties</li></ul></div><div class='etip'>When a significant risk is identified, the auditor MUST obtain an understanding of the entity controls relevant to that risk - even if substantive procedures alone seem sufficient.</div>";
PAGES["t4s3"] = "<div class='page-hero'><span class='badge'>Topic 4</span><h1>Audit Planning (ISA 300)</h1><p>The overall audit strategy, audit plan, audit programmes, documentation, and working papers.</p></div><h2 class='sec'>Why Planning Matters</h2><div class='card'><ul class='cl'><li>Ensures appropriate attention devoted to key audit areas and significant risks</li><li>Potential problems identified and resolved on a timely basis</li><li>Engagement properly organised and managed</li><li>Proper assignment of work to engagement team with appropriate capabilities</li><li>Facilitates supervision, direction, and review</li></ul></div><h2 class='sec'>Audit Plan vs Audit Programme</h2><div class='cgrid'><div class='cbox left'><h4>Audit Plan</h4><p class='cp'>Documents assessment of risk and response. Sets out nature, timing, and extent of overall procedures. Reflects decision on whether to test controls. Typically prepared by Manager.</p></div><div class='cbox right'><h4>Audit Programme</h4><p class='cp'>Documents nature, timing, and extent of procedures at the assertion level for each material class of transactions and balance. Serves as instructions to the team. Typically drafted by Senior.</p></div></div><h2 class='sec'>Working Papers</h2><div class='accordion'><button class='ah' onclick='toggleAcc(this)'>Permanent Audit File (PAF) <span class='ai'>+</span></button><div class='ab'><div class='abi'><ul class='cl'><li>Statutory material - Companies Act, NSE regulations</li><li>Articles of association or partnership deed</li><li>Organizational chart and authority lines</li><li>List of directors, shareholdings, and service contracts</li><li>Company advisors - bankers, lawyers, stockbrokers, valuers</li><li>Accounting policies on material areas - stock, depreciation</li></ul></div></div></div><div class='accordion'><button class='ah' onclick='toggleAcc(this)'>Current Audit File (CAF) <span class='ai'>+</span></button><div class='ab'><div class='abi'><ul class='cl'><li>Copy of accounts being audited signed by directors</li><li>File index</li><li>Description of internal control system - flowcharts, questionnaires</li><li>Audit programme with objectives and planned procedures</li><li>Balance sheet and P and L schedules with audit conclusions</li><li>Management letter and letters of representation</li></ul></div></div></div><div class='etip'>Working papers must be sufficiently complete that an inexperienced auditor with no previous connection to the audit can understand the work done, evidence obtained, and conclusions reached.</div>";
PAGES["t4s4"] = "<div class='page-hero'><span class='badge'>Topic 4</span><h1>Audit Risk Assessment</h1><p>The audit risk model and its components: Inherent Risk, Control Risk, and Detection Risk.</p></div><h2 class='sec'>The Audit Risk Model</h2><div class='hbox' style='text-align:center;'><div style='font-size:1.2rem;font-weight:700;color:#1E3A8A;margin-bottom:0.5rem;'>Audit Risk = Inherent Risk x Control Risk x Detection Risk</div><p style='font-size:0.875rem;color:#475569;'>AR = IR x CR x DR</p></div><p class='fhint'>Click each card to understand the risk components</p><div class='fgrid'><div class='fc' onclick='this.classList.toggle(\"flipped\")'><div class='fi'><div class='ff'><h3>Inherent Risk (IR)</h3></div><div class='fb'>Susceptibility of an assertion to misstatement, assuming no related internal controls. Not directly controlled by the auditor. Higher for complex transactions and judgmental areas.</div></div></div><div class='fc' onclick='this.classList.toggle(\"flipped\")'><div class='fi'><div class='ff'><h3>Control Risk (CR)</h3></div><div class='fb'>Risk that a material misstatement will not be prevented or detected by internal controls on a timely basis. A function of the effectiveness of internal controls.</div></div></div><div class='fc' onclick='this.classList.toggle(\"flipped\")'><div class='fi'><div class='ff'><h3>Detection Risk (DR)</h3></div><div class='fb'>Risk that the auditors procedures will not detect a material misstatement. The ONLY component directly under auditors control - reduced by doing more or better tests.</div></div></div></div><div class='wbox'><b>Key Relationship:</b> If IR and CR are HIGH, the auditor must set DR LOW - meaning MORE substantive testing required. If IR and CR are LOW, DR can be HIGHER - meaning LESS testing needed.</div><div class='etip'>Detection risk is the INVERSE of audit procedures. Lower DR means more extensive rigorous procedures. This is the auditors lever for controlling overall audit risk.</div>";
PAGES["t4s5"] = "<div class='page-hero'><span class='badge'>Topic 4</span><h1>Fraud, Errors and Other Irregularities</h1><p>The distinction between fraud and error, auditor responsibilities, and the expectation gap.</p></div><h2 class='sec'>Error vs Fraud</h2><div class='cgrid'><div class='cbox left'><h4>Error (Unintentional)</h4><ul class='cl'><li>Errors of commission - correct amount, wrong account</li><li>Errors of omission - transactions completely omitted</li><li>Errors of principle - item in wrong class of account</li><li>Compensating errors - errors cancel each other</li><li>Errors of original entry - incorrect original figure</li><li>Complete reversal entries - correct accounts, wrong side</li></ul></div><div class='cbox right'><h4>Fraud (Intentional)</h4><ul class='cl'><li>Manipulating, forging, or falsifying records</li><li>Misappropriation of assets - stealing, embezzling</li><li>Misapplication of accounting policies</li><li>Changing assumptions to manipulate account balances</li><li>Suppression of transaction effects</li></ul></div></div><h2 class='sec'>Responsibility for Detection</h2><div class='wbox'><b>Primary Responsibility:</b> Management is PRIMARILY responsible for detection and prevention of fraud and error through implementation and operation of adequate internal control systems.<br><br><b>Auditors Role:</b> Seek REASONABLE ASSURANCE that fraud and error which may be material has not occurred, or if it has, is properly reflected. The auditor cannot be held responsible for failing to detect ALL fraud.</div><h2 class='sec'>The Expectations Gap</h2><div class='card'><p class='cp'>The public often incorrectly believes auditors should:</p><ul class='cl'><li>Protect the company against ALL fraud and irregularities</li><li>Certify the company as a going concern</li><li>Provide general assurance of financial wellbeing</li><li>Be responsible for preparing the financial statements</li></ul></div><div class='etip'>Teeming and lading means stealing cash receipts and covering by posting subsequent receipts to the defrauded account. Detection: check counterfoils of receipts; cashier should NOT have access to the ledger.</div>";
PAGES["t5s1"] = "<div class='page-hero'><span class='badge'>Topic 5</span><h1>Nature, Purpose and Scope of Forensic Accounting</h1><p>The specialized discipline combining accounting expertise with legal investigation skills.</p></div><h2 class='sec'>Definition</h2><div class='hbox'><b>Forensic Accounting:</b> The use of accounting skills to investigate fraud or embezzlement and to analyze financial information for use in legal proceedings. Forensic means suitable for use in a court of law.<br><br>Accountants look at the numbers, but Forensic Accountants look behind the numbers.</div><h2 class='sec'>Two Main Categories</h2><div class='cgrid'><div class='cbox left'><h4>Litigation Support</h4><p class='cp'>Provision of assistance of an accounting nature in matters involving existing or pending litigation. Focuses on quantifying economic damages from breach of contract, valuations, asset tracing, revenue recovery, and accounting reconstruction.</p></div><div class='cbox right'><h4>Investigative Accounting</h4><p class='cp'>Concerned with investigations of a criminal nature - employee fraud, securities fraud, insurance fraud, kickbacks, advance fee frauds. Often both categories are required together.</p></div></div><h2 class='sec'>Services Provided</h2><table class='tbl'><tr><th>Service</th></tr><tr><td>Business valuations</td></tr><tr><td>Divorce proceedings and matrimonial disputes</td></tr><tr><td>Personal injury and fatal accident claims</td></tr><tr><td>Professional negligence cases</td></tr><tr><td>Insurance claims evaluations</td></tr><tr><td>Arbitration</td></tr><tr><td>Partnership and corporation disputes</td></tr><tr><td>Civil and criminal fraud actions</td></tr></table><div class='accordion'><button class='ah' onclick='toggleAcc(this)'>Advantages and Disadvantages <span class='ai'>+</span></button><div class='ab'><div class='abi'><div class='sbox'><b>Advantages:</b><ul class='cl'><li>Fraud identification and prevention</li><li>Helps investors make sound investment decisions</li><li>Helps government formulate improved economic policies</li></ul></div><div class='wbox' style='margin-top:1rem;'><b>Disadvantages:</b><ul class='cl'><li>Confidentiality issues - risk of leakage of information</li><li>Expensive - high-end software and high professional fees</li><li>Employees feel distrusted if no fraud is found</li><li>Cannot also be auditor of the same client</li></ul></div></div></div></div>";
PAGES["t5s2"] = "<div class='page-hero'><span class='badge'>Topic 5</span><h1>Types of Forensic Investigations</h1><p>The three main categories: Corruption, Asset Misappropriation, and Financial Statement Fraud.</p></div><h2 class='sec'>Category 1: Corruption</h2><div class='card'><p class='cp'>Research shows corruption is involved in approximately one third of all frauds. Three types:</p><p class='fhint'>Click to reveal details</p><div class='fgrid'><div class='fc' onclick='this.classList.toggle(\"flipped\")'><div class='fi'><div class='ff'><h3>Conflict of Interest</h3></div><div class='fb'>Fraudster exerts influence to achieve personal gain that harms the company. May not be financial - e.g., manager approves friends inaccurate expense claims to maintain friendship.</div></div></div><div class='fc' onclick='this.classList.toggle(\"flipped\")'><div class='fi'><div class='ff'><h3>Bribery</h3></div><div class='fb'>Money or something of value is OFFERED to influence a situation. Pro-active: the briber initiates the corrupt transaction.</div></div></div><div class='fc' onclick='this.classList.toggle(\"flipped\")'><div class='fi'><div class='ff'><h3>Extortion</h3></div><div class='fb'>The opposite of bribery - money is DEMANDED to secure a particular outcome. Passive: victim initiates to avoid harm.</div></div></div></div></div><h2 class='sec'>Category 2: Asset Misappropriation</h2><div class='card'><p class='cp'>The most common fraud type - theft of cash or other assets:</p><ul class='cl'><li><b>Cash theft</b> - stealing physical cash including petty cash</li><li><b>Fraudulent disbursements</b> - billing schemes with fictitious suppliers; payroll schemes with ghost employees</li><li><b>Inventory frauds</b> - theft of inventory from the company</li><li><b>Misuse of assets</b> - employees using company assets for personal interests</li></ul></div><h2 class='sec'>Category 3: Financial Statement Fraud</h2><div class='wbox'><ul class='cl'><li>Deliberate falsification of accounting records</li><li>Omission of transactions, balances, or disclosures</li><li>Misapplication of financial reporting standards</li><li>Often aims to conceal liabilities to improve liquidity or gearing ratios</li></ul></div><h2 class='sec'>Common Accounting Fraud Areas</h2><table class='tbl'><tr><th>Area</th><th>Common Fraud Scenarios</th></tr><tr><td>Revenue Recognition</td><td>Premature recognition; phantom sales; improperly valued transactions</td></tr><tr><td>Reserves</td><td>Bad faith estimates; one-time charges</td></tr><tr><td>Inventory</td><td>Over-valuation; non-existent inventory</td></tr><tr><td>Expenses</td><td>Delayed expense recognition; improper capitalisation of expenses</td></tr></table>";
PAGES["t5s3"] = "<div class='page-hero'><span class='badge'>Topic 5</span><h1>Fraud Prevention and Deterrence</h1><p>Practical measures to prevent, detect, and deter fraud within organizations.</p></div><h2 class='sec'>Key Prevention Strategies</h2><div class='card'><ol class='cl'><li><b>Implement Internal Controls:</b> Spread and rotate financial duties among two or more employees. Mandatory vacation of at least one consecutive week for financial staff.</li><li><b>Tone at the Top:</b> Business owner and senior management serve as role models of honesty and integrity. Zero tolerance policy for fraud.</li><li><b>Positive Workplace Environment:</b> Focus on employee morale; empower employees; communicate effectively.</li><li><b>Hire and Promote Appropriately:</b> Background checks; verify education and employment history.</li><li><b>Code of Conduct:</b> Formalized, founded on integrity; defines acceptable behavior; communicated to all; violations addressed immediately.</li><li><b>Whistleblower System:</b> Anonymous reporting mechanism for employees, vendors, and customers.</li><li><b>Regular Surprise Audits:</b> Serve as deterrent - employees aware that checks may occur at any time.</li></ol></div><h2 class='sec'>Forensic Accountant Skills</h2><div class='cgrid'><div class='cbox left'><h4>Core Skills</h4><ul class='cl'><li>Critical analysis of financial statements</li><li>Understanding internal control systems</li><li>IT and computer network proficiency</li><li>Knowledge of psychology and criminal behavior</li><li>Insight into corporate governance and laws</li><li>Command of criminal and civil laws</li></ul></div><div class='cbox right'><h4>Personal Qualities</h4><ul class='cl'><li>Sound professional judgment</li><li>Look beyond numbers to substance</li><li>Ability to reconstruct past transactions</li><li>Curiosity, persistence, and creativity</li><li>Attention to smallest detail</li><li>Composure under cross-examination</li></ul></div></div><div class='etip'>If a forensic investigation is requested by an audit client, the firm faces extra ethical risks: self-review, advocacy, and management threats. Unless robust safeguards exist, the firm should NOT provide both audit and forensic investigation services to the same client.</div>";
PAGES["t6s1"] = "<div class='page-hero'><span class='badge'>Topic 6</span><h1>Internal Control Systems - Theory and Practice</h1><p>Components, objectives, and types of controls that protect the organization.</p></div><h2 class='sec'>Definition (ISA 400)</h2><div class='hbox'><b>Accounting System:</b> The series of tasks and records by which transactions are processed and proper financial records maintained.<br><br><b>Internal Control System:</b> All policies and procedures adopted by management to achieve objectives as far as practicable.</div><h2 class='sec'>Objectives of Internal Control</h2><div class='card'><ul class='cl'><li>Orderly and efficient conduct of business</li><li>Adherence to management policies</li><li>Safeguarding of company assets</li><li>Prevention and detection of fraud and error</li><li>Accuracy and completeness of accounting records</li><li>Timely preparation of reliable financial information</li></ul></div><h2 class='sec'>Types of Control Procedures</h2><div class='accordion'><button class='ah' onclick='toggleAcc(this)'>Organizational Controls <span class='ai'>+</span></button><div class='ab'><div class='abi'><p class='cp'>Organizational chart showing departments, functions, and responsible persons. Prevents duplication, boosts accountability. Delegation and authority limits must be clearly defined.</p></div></div></div><div class='accordion'><button class='ah' onclick='toggleAcc(this)'>Segregation of Duties <span class='ai'>+</span></button><div class='ab'><div class='abi'><p class='cp'>One person cannot process a complete transaction without being checked. Different people must perform: initiation, authorization, execution, recording, and custody.</p><p class='cp'>Example: The person who authorizes a sale should NOT authorize credit notes for the same customer.</p></div></div></div><div class='accordion'><button class='ah' onclick='toggleAcc(this)'>Physical Controls <span class='ai'>+</span></button><div class='ab'><div class='abi'><ul class='cl'><li>Direct: locks and keys, security guards, CCTV cameras, fences</li><li>Indirect: fixed asset movement registers, vehicle utilization records</li></ul></div></div></div><div class='accordion'><button class='ah' onclick='toggleAcc(this)'>Authorization, Personnel and Other Controls <span class='ai'>+</span></button><div class='ab'><div class='abi'><table class='tbl'><tr><th>Control Type</th><th>Description</th></tr><tr><td>Authorization and Approval</td><td>Transactions committing resources require approval by responsible official with specified limits</td></tr><tr><td>Arithmetic and Accounting Controls</td><td>Pre-numbered documents, sequence checks, exception reports, bank reconciliations</td></tr><tr><td>Personnel</td><td>Recruit competent staff with integrity; training; responsibilities match capability</td></tr><tr><td>Supervision</td><td>Competent review of transactions and recording</td></tr><tr><td>Rotation of Duties</td><td>Rotate duties at same level; mandatory annual leave</td></tr></table></div></div></div><h2 class='sec'>Limitations of Internal Control</h2><div class='wbox'><ul class='cl'><li>Cost-benefit: Benefits must outweigh costs - some controls may be too expensive</li><li>Limited coverage: Controls tend to target routine transactions; non-routine may lack controls</li><li>Human error: Carelessness, distraction, poor judgment</li><li>Abuse of responsibility: Senior managers may override controls</li><li>Corruption and Collusion: Employees collude to circumvent controls</li></ul></div>";
PAGES["t6s2"] = "<div class='page-hero'><span class='badge'>Topic 6</span><h1>Evaluating Internal Controls and Tests of Control</h1><p>How auditors ascertain, record, confirm, evaluate, and test the internal control system.</p></div><h2 class='sec'>Four Steps in Control Evaluation</h2><div class='pflow'><div class='pstep'>1. Ascertain</div><div class='parr'>to</div><div class='pstep'>2. Record</div><div class='parr'>to</div><div class='pstep'>3. Confirm</div><div class='parr'>to</div><div class='pstep'>4. Evaluate</div></div><h2 class='sec'>Recording Methods</h2><table class='tbl'><tr><th>Method</th><th>Description</th><th>Best Used When</th></tr><tr><td><b>Flow Charts</b></td><td>Diagrammatic representations showing movement of documents through the system</td><td>Complex systems with multiple departments</td></tr><tr><td><b>ICQ</b></td><td>Internal Control Questionnaire - Yes/No questions establishing whether desirable controls are in place</td><td>Standard systems assessment</td></tr><tr><td><b>ICEQ</b></td><td>Internal Control Evaluation Questionnaire - questions seeking whether specific errors or frauds COULD occur</td><td>Risk-focused evaluation</td></tr><tr><td><b>Narratives</b></td><td>Written explanatory notes describing the system</td><td>Simple systems; single-person operations</td></tr></table><h2 class='sec'>Walk-Through Tests</h2><div class='hbox'><b>Walk-Through Test:</b> Select a particular transaction and trace it through the accounting information system from initial capture to its final recording in the financial statements. Purpose: confirm the system as recorded actually exists and operates as described.</div><h2 class='sec'>Tests of Control (Compliance Tests)</h2><div class='card'><ul class='cl'><li><b>Inspection</b> - examine documents supporting transactions to ensure controls operated</li><li><b>Inquiry</b> - ask about controls with no audit trail such as security procedures during wage payment</li><li><b>Re-performance</b> - independently perform the control such as reperform bank reconciliation</li><li><b>Observation</b> - watch control procedures being performed such as attending stock count</li></ul></div><div class='etip'>ICEQ questions test what CAN GO WRONG rather than whether controls ARE present. Example: Can goods be dispatched without being invoiced? Can employees be paid for work not done?</div>";
PAGES["t6s3"] = "<div class='page-hero'><span class='badge'>Topic 6</span><h1>Management Letter (Letter of Weakness)</h1><p>Communication of internal control findings to management - a key value-added service.</p></div><h2 class='sec'>What is the Management Letter?</h2><div class='hbox'><p class='cp'>The management letter summarizes the auditors findings concerning strengths and weaknesses of the accounting and internal control system. Also known as: letter of weakness, internal control memorandum, letter of recommendations, constructive service letter.</p></div><h2 class='sec'>Purposes of the Management Letter</h2><div class='card'><ul class='cl'><li>Highlights areas of weakness that may result in material errors and advises on improvement</li><li>Provides constructive advice where efficiency may be improved</li><li>Creates a written record of matters arising - can be used as evidence in litigation</li><li>Ensures comments reach management members who have power to act</li><li>Effective feedback that promotes a constructive auditor-management relationship</li></ul></div><h2 class='sec'>Good Practice in Management Letters</h2><div class='card'><ul class='cl'><li>Discuss weaknesses with appropriate officials BEFORE documenting to avoid misunderstandings</li><li>Address to the Board of Directors or audit committee</li><li>Serious weaknesses should be reported immediately</li><li>Request management comments and intended corrective actions</li><li>Keep letter confidential - do NOT release to third parties without written consent</li><li>Follow up on previous years management letter points at subsequent audit</li></ul></div><div class='etip'>The management letter is NOT a statutory requirement, but it is a natural extension of the audit adding value to the client.</div>";
PAGES["t6s4"] = "<div class='page-hero'><span class='badge'>Topic 6</span><h1>IT Threats and Controls</h1><p>How information technology affects internal controls and the specific risks and benefits it introduces.</p></div><h2 class='sec'>Benefits of IT to Internal Control</h2><div class='sbox'><ul class='cl'><li>Consistently apply predefined business rules and complex calculations</li><li>Enhance timeliness, availability, and accuracy of information</li><li>Facilitate additional analysis of information</li><li>Enhance monitoring of entity activities and policies</li><li>Reduce risk that controls will be circumvented</li><li>Achieve effective segregation of duties through security controls in applications and databases</li></ul></div><h2 class='sec'>IT Risks to Internal Control</h2><div class='wbox'><ul class='cl'><li>Reliance on inaccurately processing systems or inaccurate data</li><li>Unauthorized access to data - destruction or improper changes including non-existent transactions</li><li>IT personnel gaining access privileges beyond their duties - breaks segregation</li><li>Unauthorized changes to data in master files or to systems and programs</li><li>Failure to make necessary changes to systems</li><li>Potential loss of data or inability to access data</li></ul></div><h2 class='sec'>Manual vs Automated Controls</h2><div class='cgrid'><div class='cbox left'><h4>Manual Controls Better For:</h4><ul class='cl'><li>Large, unusual, or non-recurring transactions</li><li>Errors difficult to define or predict</li><li>Changing circumstances requiring judgment</li><li>Monitoring effectiveness of automated controls</li></ul></div><div class='cbox right'><h4>Automated Controls Better For:</h4><ul class='cl'><li>High-volume or recurring transactions</li><li>Errors that can be anticipated and defined</li><li>Consistent application of complex rules</li><li>Activities where control procedures can be precisely designed</li></ul></div></div>";
