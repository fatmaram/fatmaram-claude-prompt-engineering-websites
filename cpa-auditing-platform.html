PAGES["t7s1"] = "<div class='page-hero'><span class='badge'>Topic 7</span><h1>Assertions and Audit Evidence</h1><p>What audit evidence is, where it comes from, and how assertions drive evidence-gathering.</p></div><h2 class='sec'>What is Audit Evidence?</h2><div class='hbox'><b>Audit Evidence:</b> All information used by the auditor in arriving at the conclusions on which the audit opinion is based. Includes source documents, accounting records, and other information.</div><h2 class='sec'>Qualities of Audit Evidence (ISA 500)</h2><table class='tbl'><tr><th>Quality</th><th>Meaning</th><th>Key Points</th></tr><tr><td><b>Sufficiency</b></td><td>Enough evidence - quantity</td><td>A matter of professional judgment; affected by materiality and risk</td></tr><tr><td><b>Relevance</b></td><td>Relates to the assertion being tested</td><td>Evidence must address the specific audit objective</td></tr><tr><td><b>Reliability</b></td><td>Credibility of the evidence</td><td>More reliable if: from independent source; documentary; directly obtained</td></tr></table><h2 class='sec'>Reliability Hierarchy</h2><div class='card'><ul class='cl'><li>Obtained from <b>independent sources outside the entity</b> - most reliable</li><li>Generated internally when related controls are effective</li><li>Obtained directly by the practitioner rather than indirectly</li><li>Exists in documentary form</li><li>Provided by original documents not copies</li></ul></div><h2 class='sec'>Methods of Obtaining Audit Evidence</h2><p class='fhint'>Click each card</p><div class='fgrid'><div class='fc' onclick='this.classList.toggle(\"flipped\")'><div class='fi'><div class='ff'><h3>Inspection</h3></div><div class='fb'>Examining records, documents, or tangible assets. Physical inspection confirms EXISTENCE but not necessarily value or ownership.</div></div></div><div class='fc' onclick='this.classList.toggle(\"flipped\")'><div class='fi'><div class='ff'><h3>Observation</h3></div><div class='fb'>Looking at procedures being performed by others. Evidence only for the moment observed.</div></div></div><div class='fc' onclick='this.classList.toggle(\"flipped\")'><div class='fi'><div class='ff'><h3>Inquiry and Confirmation</h3></div><div class='fb'>Seeking information from knowledgeable persons. Confirmation means response from third party such as debtors circularization.</div></div></div><div class='fc' onclick='this.classList.toggle(\"flipped\")'><div class='fi'><div class='ff'><h3>Recalculation</h3></div><div class='fb'>Checking arithmetic accuracy of source documents, or independently performing controls such as recomputing depreciation.</div></div></div><div class='fc' onclick='this.classList.toggle(\"flipped\")'><div class='fi'><div class='ff'><h3>Analytical Procedures</h3></div><div class='fb'>Analysis of relationships between financial data - identifying consistency, predicted patterns, significant fluctuations, and unexpected results.</div></div></div></div>";
PAGES["t7s2"] = "<div class='page-hero'><span class='badge'>Topic 7</span><h1>Analytical Procedures and Management Representations</h1><p>Using relationships between data as evidence, and the role of management representations.</p></div><h2 class='sec'>Analytical Procedures</h2><div class='hbox'><b>Analytical Procedures:</b> Evaluation of financial information by studying relationships among financial and non-financial data. Based on the premise that logical relationships among data may be expected to exist and continue absent contrary conditions.</div><h2 class='sec'>When Analytical Procedures Are Required</h2><div class='pflow'><div class='pstep'>Planning Stage - required</div><div class='parr'>to</div><div class='pstep'>As Substantive Procedures - optional</div><div class='parr'>to</div><div class='pstep'>Final Review Stage - required</div></div><h2 class='sec'>Four-Step Analytical Procedure Process</h2><div class='card'><ol class='cl'><li><b>Develop an expectation</b> using prior period data, budgets, industry data, or relationships</li><li><b>Determine acceptable difference</b> - what difference from expectation can be accepted without investigation? Based on materiality and desired assurance level.</li><li><b>Compare account balance or ratio with expectation</b> and identify significant differences</li><li><b>Investigate and evaluate significant differences</b> - seek management explanations; corroborate with other evidence; expand tests if explanations are not supported</li></ol></div><h2 class='sec'>Management Representations (ISA 580)</h2><div class='card'><ul class='cl'><li>Summarize most important oral representations made during the audit</li><li>Dated as of the auditors report date - last day of field work</li><li>Signed by both CEO and Chief Accountant</li><li>CANNOT be a substitute for performing other audit procedures</li></ul></div><div class='accordion'><button class='ah' onclick='toggleAcc(this)'>What the Management Representation Letter Covers <span class='ai'>+</span></button><div class='ab'><div class='abi'><ul class='cl'><li>All accounting records and minutes of meetings have been made available</li><li>Financial statements are complete and prepared in conformity with GAAP</li><li>Management believes unrecorded adjusting entries are not material</li><li>All contingencies, illegal acts, and related party transactions have been properly disclosed</li><li>Acknowledges responsibility for design and implementation of internal controls</li></ul></div></div></div><div class='wbox' style='margin-top:1rem;'>If management refuses to provide representations, this constitutes a limitation in scope and the auditor should consider expressing a qualified opinion or disclaimer of opinion.</div>";
PAGES["t7s3"] = "<div class='page-hero'><span class='badge'>Topic 7</span><h1>Audit Sampling (ISA 530)</h1><p>Design, selection, and evaluation of samples - statistical vs non-statistical approaches.</p></div><h2 class='sec'>Why Audit Sampling?</h2><div class='card'><ul class='cl'><li>Complete check of all transactions is no longer possible - too numerous</li><li>Time constraint - a complete check would make accounts ancient history by the time users saw them</li><li>Valid conclusions can be reached from a well-constructed sample</li></ul></div><h2 class='sec'>Sample Size Factors</h2><table class='tbl'><tr><th>Factor</th><th>Effect on Sample Size</th></tr><tr><td>Higher tolerable error</td><td>Smaller sample needed</td></tr><tr><td>Higher inherent risk assessment</td><td>Larger sample needed</td></tr><tr><td>Higher control risk assessment</td><td>Larger sample needed</td></tr><tr><td>Higher required confidence level</td><td>Larger sample needed</td></tr></table><h2 class='sec'>Sampling Methods</h2><div class='accordion'><button class='ah' onclick='toggleAcc(this)'>Random Sampling <span class='ai'>+</span></button><div class='ab'><div class='abi'><p class='cp'>Using random number tables or computers. Each item has an equal chance of selection. Basis of statistical sampling.</p></div></div></div><div class='accordion'><button class='ah' onclick='toggleAcc(this)'>Systematic Selection <span class='ai'>+</span></button><div class='ab'><div class='abi'><p class='cp'>Divide population by sample size to get a sampling interval. Select a random start within the first interval, then every nth item. Example: population 600, sample 50 gives interval of 12. If item 3 is start: items 3, 15, 27, 39 are selected. Risk: periodic patterns may bias the sample.</p></div></div></div><div class='accordion'><button class='ah' onclick='toggleAcc(this)'>Haphazard vs Block Selection <span class='ai'>+</span></button><div class='ab'><div class='abi'><ul class='cl'><li><b>Haphazard:</b> Without structured technique, avoiding conscious bias. NOT suitable for statistical sampling.</li><li><b>Block sampling:</b> Continuous items such as all August transactions. Cannot ordinarily be used as block items may have similar characteristics making the sample unrepresentative.</li></ul></div></div></div><h2 class='sec'>Statistical vs Non-Statistical Sampling</h2><div class='cgrid'><div class='cbox left'><h4>Statistical Sampling</h4><ul class='cl'><li>Random selection plus probability theory</li><li>Scientific, defensible in court</li><li>Eliminates personal bias</li><li>Smaller samples from probability theory</li><li>Expensive - needs IT and trained staff</li></ul></div><div class='cbox right'><h4>Judgmental Non-Statistical</h4><ul class='cl'><li>Experience and knowledge drive selection</li><li>No special statistical knowledge needed</li><li>Larger samples needed to reduce risk</li><li>Risk of personal bias</li></ul></div></div><div class='etip'>Monetary Unit Sampling (MUS) - suited to large-variance populations like debtors or stock. Large items have higher chance of selection. NOT suitable for creditors testing where understatement is the risk.</div>";
PAGES["t7s4"] = "<div class='page-hero'><span class='badge'>Topic 7</span><h1>Audit of Specific Items</h1><p>Key procedures for auditing tangible assets, receivables, cash, inventory, payables, and provisions.</p></div><h2 class='sec'>Audit of Tangible Non-Current Assets</h2><table class='tbl'><tr><th>Assertion</th><th>Key Procedures</th></tr><tr><td>Completeness</td><td>Obtain summary reconciling gross book value, accumulated depreciation, and net book value. Compare non-current assets register to general ledger.</td></tr><tr><td>Existence</td><td>Inspect assets concentrating on high-value items and additions. Confirm assets exist, are in use, in good condition.</td></tr><tr><td>Valuation</td><td>Verify to valuation certificate; assess reasonableness; review depreciation rates against asset lives and residual values.</td></tr><tr><td>Rights and Obligations</td><td>Verify title deeds for land and buildings; registration documents for vehicles; examine hire purchase or lease agreements.</td></tr></table><h2 class='sec'>Audit of Receivables - Circularization</h2><div class='cgrid'><div class='cbox left'><h4>Positive Confirmation</h4><p class='cp'>Customer asked to confirm accuracy of balance or state disagreement. Preferable - designed to encourage definite replies.</p></div><div class='cbox right'><h4>Negative Confirmation</h4><p class='cp'>Customer asked to reply ONLY if amount is disputed. Used when internal controls are strong and there are many small accounts.</p></div></div><h2 class='sec'>Audit of Cash and Bank</h2><div class='card'><div class='ssec'>Bank Confirmation Letter:</div><ul class='cl'><li>Sent to bank with client written authority</li><li>Covers: balances, interest terms, unused facilities, contingent liabilities, guarantees, items in safe custody</li><li>Request should reach branch manager at least one month in advance of year-end</li><li>Replies must be returned directly to the auditors</li></ul><div class='ssec' style='margin-top:0.75rem;'>Cash Count:</div><ul class='cl'><li>All balances counted simultaneously</li><li>Auditors never left alone with cash</li><li>Obtain certificates of cash-in-hand from responsible officials</li></ul></div><h2 class='sec'>Audit of Trade Payables</h2><div class='wbox'><b>Key Focus - Completeness (Understatement):</b> The primary risk is that liabilities are understated. Unlike receivables, auditors focus on finding UNRECORDED liabilities. Use suppliers statements, confirmations, and examination of post-year-end payments.</div><h2 class='sec'>Provisions, Contingent Liabilities and Assets</h2><table class='tbl'><tr><th>Term</th><th>Definition</th></tr><tr><td>Provision</td><td>A liability of uncertain timing or amount</td></tr><tr><td>Contingent Liability</td><td>Possible obligation from past events confirmed only by future uncertain events; or present obligation where outflow not probable or amount not measurable</td></tr><tr><td>Contingent Asset</td><td>Possible asset from past events confirmed only by uncertain future events - recognized only when virtually certain</td></tr></table>";
PAGES["t7s5"] = "<div class='page-hero'><span class='badge'>Topic 7</span><h1>Using Work of Others and CAATs</h1><p>Relying on experts, internal auditors, and computer-assisted audit techniques.</p></div><h2 class='sec'>Using the Work of an Expert</h2><div class='hbox'><b>Expert:</b> A person possessing specialized skills, knowledge, and experience in a field other than auditing and accounting such as a valuer, pharmacist, lawyer, or actuary.</div><div class='card'><div class='ssec'>Situations Requiring an Expert:</div><ul class='cl'><li>Legal interpretation of contracts, laws, and regulations</li><li>Valuations of certain asset types - precious stones, minerals, buildings</li><li>Actuarial valuations such as pension funds</li><li>Measuring work completed in construction contracts</li></ul><div class='ssec' style='margin-top:0.75rem;'>Factors Before Relying on Expert:</div><ul class='cl'><li>Skills and competence - professional qualifications and experience</li><li>Objectivity and independence from the client</li><li>Source and reliability of data used by the expert</li><li>Assumptions and methods used - are they appropriate?</li></ul></div><h2 class='sec'>Computer Assisted Audit Techniques (CAATs)</h2><div class='cgrid'><div class='cbox left'><h4>Audit Software</h4><p class='cp'>Used to interrogate a clients system. Can scrutinize large data volumes efficiently. Can perform: extract samples by criteria; calculate ratios; check arithmetic; prepare reports; stratify data; trace transactions.</p></div><div class='cbox right'><h4>Test Data</h4><p class='cp'>Submit dummy data into the clients system to ensure correct processing and that the system prevents or detects or corrects misstatements. Must include data WITH errors built in AND data without errors.</p></div></div><div class='accordion'><button class='ah' onclick='toggleAcc(this)'>Advantages of CAATs <span class='ai'>+</span></button><div class='ab'><div class='abi'><ul class='cl'><li>Independently access data stored on computer without dependence on client</li><li>Test reliability of client software and IT application controls</li><li>Increase accuracy of audit tests</li><li>Perform tests more efficiently - long-term cost-effective</li></ul></div></div></div><div class='accordion'><button class='ah' onclick='toggleAcc(this)'>Disadvantages of CAATs <span class='ai'>+</span></button><div class='ab'><div class='abi'><ul class='cl'><li>Expensive and time-consuming to set up</li><li>Client permission and cooperation may be difficult to obtain</li><li>Potential incompatibility with clients system</li><li>Audit team may lack sufficient IT skills</li><li>Data may be corrupted or lost during application</li></ul></div></div></div>";
PAGES["t8s1"] = "<div class='page-hero'><span class='badge'>Topic 8</span><h1>Subsequent Events Review (ISA 560)</h1><p>Identifying and responding to events between the balance sheet date and the audit report date.</p></div><h2 class='sec'>Types of Subsequent Events</h2><div class='cgrid'><div class='cbox left'><h4>Adjusting Events</h4><p class='cp'>Provide evidence of conditions that EXISTED at the end of the reporting period. Financial statements must be ADJUSTED.</p><p class='cp'>Examples: Resolution of court case confirming existing liability; customer going bankrupt shortly after year-end; fraud discovered that occurred during the year.</p></div><div class='cbox right'><h4>Non-Adjusting Events</h4><p class='cp'>Indicative of conditions that AROSE AFTER the end of the reporting period. DISCLOSE only if material - do not adjust.</p><p class='cp'>Examples: Major acquisition after year-end; fire destroying property after year-end; announcement of major restructuring.</p></div></div><h2 class='sec'>Subsequent Events Review Procedures</h2><div class='card'><ul class='cl'><li>Enquire into management procedures for identifying subsequent events</li><li>Read minutes of members and directors meetings held after the balance sheet date</li><li>Review accounting records - budgets, forecasts, interim information</li><li>Make enquiries of directors about subsequent events</li><li>Perform normal post-balance-sheet work: check after-date receipts from receivables; verify accruals against subsequent invoices</li><li>Obtain management representation letter</li></ul></div><h2 class='sec'>Three-Stage Responsibility Framework</h2><div class='accordion'><button class='ah' onclick='toggleAcc(this)'>Stage 1: Up to Signing the Audit Report - ACTIVE DUTY <span class='ai'>+</span></button><div class='ab'><div class='abi'><p class='cp'>Auditors have an ACTIVE DUTY to search for ALL material events between the balance sheet date and the audit report date. Must extend procedures to cover this full period.</p></div></div></div><div class='accordion'><button class='ah' onclick='toggleAcc(this)'>Stage 2: After Signing, Before Issuing - PASSIVE DUTY <span class='ai'>+</span></button><div class='ab'><div class='abi'><ul class='cl'><li>Auditors have a PASSIVE DUTY - only need to act if they BECOME AWARE of something</li><li>If a material fact becomes known: discuss with management; determine if financial statements need amendment</li><li>If management amends: perform additional procedures and issue new audit report</li><li>If management REFUSES to amend: modify the opinion; notify management not to issue financial statements; seek legal advice</li></ul></div></div></div><div class='accordion'><button class='ah' onclick='toggleAcc(this)'>Stage 3: After Financial Statements Issued - NO OBLIGATION <span class='ai'>+</span></button><div class='ab'><div class='abi'><p class='cp'>No obligation to perform additional procedures. However, if a fact becomes known that would have caused the auditor to amend the report, discuss with management and determine if amendment and reissuance is needed.</p></div></div></div><div class='etip'>Key distinction: BEFORE signing = ACTIVE duty to search. BETWEEN signing and issuing = PASSIVE duty only act if informed. AFTER issuing = NO obligation but must act if something comes to attention.</div>";
PAGES["t8s2"] = "<div class='page-hero'><span class='badge'>Topic 8</span><h1>Going Concern Review (ISA 570)</h1><p>Assessing whether the entity can continue to operate in the foreseeable future.</p></div><h2 class='sec'>Going Concern Assumption</h2><div class='hbox'><b>Going Concern:</b> The financial statements assume the enterprise will continue in operational existence for the foreseeable future - no intention or necessity to liquidate or significantly curtail operations. Assets and liabilities recorded on the basis that the entity will realize assets and discharge liabilities in the normal course of business.</div><h2 class='sec'>Auditor Three Objectives (ISA 570)</h2><div class='card'><ol class='cl'><li>Obtain sufficient appropriate audit evidence regarding the appropriateness of management use of the going concern assumption</li><li>Conclude whether a material uncertainty exists related to events or conditions that may cast significant doubt on the entity ability to continue as a going concern</li><li>Determine the implications for the auditors report</li></ol></div><h2 class='sec'>Warning Signs</h2><div class='accordion'><button class='ah' onclick='toggleAcc(this)'>Financial Indicators <span class='ai'>+</span></button><div class='ab'><div class='abi'><ul class='cl'><li>Net liability or net current liability position</li><li>Fixed-term borrowings approaching maturity without realistic prospect of renewal</li><li>Indications of withdrawal of financial support by creditors</li><li>Negative operating cash flows</li><li>Adverse key financial ratios</li><li>Substantial operating losses or significant deterioration in asset values</li><li>Arrears or discontinuance of dividends</li><li>Inability to pay creditors on due dates</li></ul></div></div></div><div class='accordion'><button class='ah' onclick='toggleAcc(this)'>Operating and Other Indicators <span class='ai'>+</span></button><div class='ab'><div class='abi'><ul class='cl'><li>Management intentions to liquidate or cease operations</li><li>Loss of key management without replacement</li><li>Loss of major market, key customer, franchise, license, or principal supplier</li><li>Labor difficulties; shortages of important supplies</li><li>Non-compliance with capital or statutory requirements</li><li>Pending legal proceedings that could result in claims the entity cannot satisfy</li><li>Uninsured catastrophes</li></ul></div></div></div><h2 class='sec'>Reporting Outcomes</h2><table class='tbl'><tr><th>Situation</th><th>Auditors Response</th></tr><tr><td>GC appropriate, no material uncertainty</td><td>Unmodified opinion - no special paragraph needed</td></tr><tr><td>GC appropriate, material uncertainty EXISTS, adequate disclosure</td><td>Unmodified opinion plus Emphasis of Matter paragraph</td></tr><tr><td>GC appropriate, material uncertainty EXISTS, INADEQUATE disclosure</td><td>Qualified or adverse opinion</td></tr><tr><td>Management use of GC is INAPPROPRIATE</td><td>Adverse opinion</td></tr></table>";
PAGES["t8s3"] = "<div class='page-hero'><span class='badge'>Topic 8</span><h1>Management Representations (ISA 580)</h1><p>Written representations as a form of audit evidence - requirements, contents, and consequences of refusal.</p></div><h2 class='sec'>Purpose of Written Representations</h2><div class='card'><ul class='cl'><li>Acknowledge management responsibility for fair presentation of financial statements</li><li>Support other audit evidence about specific matters in the financial statements</li><li>Document management responses to significant audit questions</li><li>May be the only evidence available for management future intentions</li></ul></div><div class='wbox'><b>Critical Limitation:</b> Written representations provide NECESSARY but not SUFFICIENT audit evidence on their own. They do NOT replace other audit procedures.</div><h2 class='sec'>What Must Be Included</h2><div class='card'><ul class='cl'><li>Acknowledgment of responsibility for design and implementation of internal controls</li><li>Statement that effects of uncorrected misstatements are immaterial both individually and in aggregate with a summary of such items</li><li>All accounting records, financial data, and minutes have been made available to the auditor</li><li>Financial statements are complete and prepared in conformity with GAAP</li><li>All contingencies, illegal acts, and related party transactions properly disclosed</li></ul></div><h2 class='sec'>Basic Elements of the Letter</h2><div class='card'><ul class='cl'><li>Addressed to the auditor</li><li>Dated the same date as the auditors report</li><li>Signed by members of management - typically CEO and Chief Accountant or Finance Director</li><li>Based on best of their knowledge and belief</li></ul></div><div class='etip'>If management representations are CONTRADICTED by other audit evidence, the auditor must investigate the circumstances and reconsider the reliability of ALL other management representations.</div>";
PAGES["t8s4"] = "<div class='page-hero'><span class='badge'>Topic 8</span><h1>Quality Control and Role in Liquidation</h1><p>Engagement quality control review and auditor involvement in insolvency situations.</p></div><h2 class='sec'>Engagement Quality Control Review</h2><div class='card'><p class='cp'>For audits of listed entities, the engagement partner must:</p><ul class='cl'><li>Determine that an engagement quality control reviewer has been appointed</li><li>Discuss significant matters with the reviewer</li><li>NOT date the audit report until the engagement quality control review is complete</li></ul><div class='ssec' style='margin-top:0.75rem;'>The Reviewer Must:</div><ul class='cl'><li>Discuss significant matters with the engagement partner</li><li>Review the financial statements and proposed auditors report</li><li>Review selected audit documentation relating to significant judgments</li><li>Evaluate whether the proposed auditors report is appropriate</li><li>For listed entities: evaluate team independence assessment</li></ul></div><h2 class='sec'>Insolvency Key Concepts</h2><div class='hbox'><b>Insolvency:</b> The value of a company assets is less than its liabilities - net liabilities position. If all assets were sold at book value, existing liabilities could not be paid.</div><h2 class='sec'>Administration vs Liquidation</h2><div class='cgrid'><div class='cbox left'><h4>Administration</h4><p class='cp'>Aims to SAVE the company. Administrator appointed - provides a moratorium or breathing space over debts. Creditors cannot wind up the company during administration. Administrator has 8 weeks to present proposals and takes over management.</p></div><div class='cbox right'><h4>Liquidation (Winding Up)</h4><p class='cp'>Company ceases to trade. Assets sold. Liabilities paid. Company dissolved. Directors lose power to manage. Types: Compulsory (court ordered), Members Voluntary (solvent), Creditors Voluntary (insolvent).</p></div></div><h2 class='sec'>Order of Priority in Liquidation</h2><div class='card'><ol class='cl'><li>Costs of the liquidator - paid first</li><li>Preferential creditors - employees salaries and benefits in arrears</li><li>Secured creditors with fixed charges</li><li>Floating charge holders</li><li>Unsecured creditors</li><li>Preference shareholders</li><li>Equity shareholders - rank last, usually receive little or nothing</li></ol></div><div class='etip'>Equity shareholders rank LAST in liquidation. This is a frequently tested point - they take the residual risk and residual reward.</div>";
PAGES["t9s1"] = "<div class='page-hero'><span class='badge'>Topic 9</span><h1>7th Schedule Provisions and Basic Elements</h1><p>Legal requirements for audit reports and the standard structure of an auditors report.</p></div><h2 class='sec'>7th Schedule - Companies Act Requirements</h2><div class='card'><p class='cp'>The Companies Act requires auditors to state in their report:</p><ol class='cl'><li>Whether they obtained all information and explanations necessary for their audit</li><li>Whether in their opinion, proper books of account have been kept and adequate returns received from branches</li><li>Whether the balance sheet and profit/loss account are in agreement with the books and give a true and fair view of state of affairs at year-end and profit or loss for the year</li><li>For holding companies: whether group accounts are properly prepared showing true and fair view</li></ol></div><h2 class='sec'>Basic Elements of the Auditors Report</h2><table class='tbl'><tr><th>Element</th><th>Purpose and Content</th></tr><tr><td><b>i. Appropriate Title</b></td><td>Must include the word independent such as Independent Auditors Report - conveys that audit was unbiased</td></tr><tr><td><b>ii. Address</b></td><td>Usually addressed to company, stockholders, or board of directors</td></tr><tr><td><b>iii. Introductory Paragraph</b></td><td>States audit was conducted; lists financial statements audited; states that statements are managements responsibility and auditors role is to express an opinion</td></tr><tr><td><b>iv. Scope Paragraph</b></td><td>Factual statement of what was done - conducted in accordance with ISAs; audit designed to obtain reasonable assurance statements are free from material misstatement</td></tr><tr><td><b>v. Opinion Paragraph</b></td><td>The auditors conclusions - most important part; worded as an opinion not a guarantee or statement of fact</td></tr><tr><td><b>vi. Date</b></td><td>Date on which most important audit procedures were completed - the last day of auditors responsibility for reviewing significant subsequent events</td></tr><tr><td><b>vii. Name of Firm</b></td><td>Entire firm bears legal responsibility for quality of audit</td></tr></table><div class='etip'>The audit report date is critical - it indicates the LAST DAY of the auditors responsibility for review of significant events occurring after the financial statement date.</div>";
PAGES["t9s2"] = "<div class='page-hero'><span class='badge'>Topic 9</span><h1>Types of Audit Opinions</h1><p>The four types of audit opinion and when each is appropriate.</p></div><p class='fhint'>Click each card to understand the opinion types</p><div class='fgrid'><div class='fc' onclick='this.classList.toggle(\"flipped\")'><div class='fi'><div class='ff'><h3>Unqualified Opinion</h3></div><div class='fb'>Issued when auditor is satisfied in ALL material respects. Also called clean opinion. Financial statements give a true and fair view. No reservations.</div></div></div><div class='fc' onclick='this.classList.toggle(\"flipped\")'><div class='fi'><div class='ff'><h3>Qualified Opinion</h3></div><div class='fb'>Effect of disagreement or scope limitation is MATERIAL but NOT PERVASIVE. All other aspects are fine EXCEPT the specified matter. Words: except for the effects of...</div></div></div><div class='fc' onclick='this.classList.toggle(\"flipped\")'><div class='fi'><div class='ff'><h3>Adverse Opinion</h3></div><div class='fb'>Effect of disagreement is SO MATERIAL AND PERVASIVE that qualification is insufficient. Financial statements are MISLEADING as a whole. Words: the financial statements do NOT give a true and fair view.</div></div></div><div class='fc' onclick='this.classList.toggle(\"flipped\")'><div class='fi'><div class='ff'><h3>Disclaimer of Opinion</h3></div><div class='fb'>Scope limitation or uncertainty is SO MATERIAL AND PERVASIVE that the auditor CANNOT form an opinion. Words: we do not express an opinion on the financial statements.</div></div></div></div><h2 class='sec'>Qualification Matrix</h2><table class='tbl'><tr><th>Nature of Circumstance</th><th>Material but NOT Pervasive</th><th>PERVASIVE - Fundamental</th></tr><tr><td>Limitation of Scope or Uncertainty</td><td>Qualified Opinion - Except For</td><td>Disclaimer of Opinion</td></tr><tr><td>Disagreement</td><td>Qualified Opinion - Except For</td><td>Adverse Opinion</td></tr></table><h2 class='sec'>Causes of Qualification</h2><div class='accordion'><button class='ah' onclick='toggleAcc(this)'>Limitation of Scope <span class='ai'>+</span></button><div class='ab'><div class='abi'><ul class='cl'><li>Refusal by management to allow examination of certain documents</li><li>Denial of important audit procedure with no alternative available</li><li>Destruction of records through fire or other disaster</li><li>Appointed after year-end - certain evidence not available such as stock count</li></ul></div></div></div><div class='accordion'><button class='ah' onclick='toggleAcc(this)'>Disagreement with Management <span class='ai'>+</span></button><div class='ab'><div class='abi'><ul class='cl'><li>Inappropriate accounting method applied such as no depreciation charged</li><li>Disagreement with specific amounts such as provision too low for lawsuit</li><li>Inadequate disclosure of material information</li><li>Interpretation of accounting policies or legislation</li></ul></div></div></div><h2 class='sec'>Emphasis of Matter Paragraph</h2><div class='hbox'>No reservation on the financial statements, but an unusual event or condition exists that users may not otherwise understand. An extra paragraph is added WITHOUT qualifying the opinion. The paragraph contains: without qualifying our opinion.<br><br>Examples: Going concern uncertainty adequately disclosed; unusual conditions after year-end; inherent uncertainties such as contingencies unresolved at signing date.</div>";
PAGES["t9s3"] = "<div class='page-hero'><span class='badge'>Topic 9</span><h1>Modified Reports - Examples and Scenarios</h1><p>Illustrative modified audit report wordings for different scenarios.</p></div><h2 class='sec'>Limitation on Scope - Qualified Opinion</h2><div class='card' style='font-family:monospace;font-size:0.82rem;line-height:1.7;background:#f8fafc;border-left:4px solid #F59E0B;'><p>Except as discussed in the following paragraph, we conducted our audit in accordance with International Standards on Auditing...</p><p style='margin-top:0.75rem;'><b>Scope limitation paragraph:</b> We did not observe the counting of the physical inventories as of December 31, 20x1, since that date was prior to the time we were initially engaged as auditors for the company. Owing to the nature of the records, we were unable to satisfy ourselves as to inventory quantities by other audit procedures.</p><p style='margin-top:0.75rem;'><b>Opinion paragraph:</b> In our opinion, except for the effects of such adjustments, if any, as might have been determined to be necessary had we been able to satisfy ourselves as to physical inventory quantities, the financial statements give a true and fair view...</p></div><h2 class='sec'>Limitation on Scope - Disclaimer of Opinion</h2><div class='card' style='font-family:monospace;font-size:0.82rem;line-height:1.7;background:#f8fafc;border-left:4px solid #ef4444;'><p>We were not able to observe all physical inventories and confirm accounts receivable due to limitations placed on the scope of our work by the company.</p><p style='margin-top:0.75rem;'>Because of the significance of the matters discussed in the preceding paragraph, <b>we do not express an opinion</b> on the financial statements.</p></div><h2 class='sec'>Disagreement - Adverse Opinion</h2><div class='card' style='font-family:monospace;font-size:0.82rem;line-height:1.7;background:#f8fafc;border-left:4px solid #ef4444;'><p>In our opinion, because of the effects of the matters discussed in the preceding paragraphs, <b>the financial statements DO NOT give a true and fair view</b> of the financial position of the company as at December 31, 20x1, and of results of its operations and its cash flows for the year then ended...</p></div><div class='etip'>Key words: Except for means Qualified. Do not express an opinion means Disclaimer. DO NOT give a true and fair view means Adverse. In our opinion unmodified means Unqualified.</div><div class='qwrap'><h3 class='qtitle'>Test Your Knowledge</h3><div class='qq' data-answer='C'><p class='qqt'>An auditor discovers that the company has failed to include a note disclosing a material contingent liability, but the omission is not pervasive to the financial statements as a whole. What type of opinion should be issued?</p><div class='qopts'><button class='qopt' data-letter='A'>A. Unqualified opinion with emphasis of matter paragraph</button><button class='qopt' data-letter='B'>B. Disclaimer of opinion</button><button class='qopt' data-letter='C'>C. Qualified opinion (except for)</button><button class='qopt' data-letter='D'>D. Adverse opinion</button></div><p class='qexp'>This is a DISAGREEMENT (inadequate disclosure) that is MATERIAL but NOT PERVASIVE. Per the qualification matrix: Disagreement plus Material but not pervasive = Qualified (except for) opinion.</p><button class='qbtn' onclick='checkAnswer(this)'>Submit Answer</button></div></div>";
PAGES["t10s1"] = "<div class='page-hero'><span class='badge'>Topic 10</span><h1>Introduction to Public Sector Auditing</h1><p>Objectives, types, and elements of public sector auditing in Kenya and internationally.</p></div><h2 class='sec'>Why Public Sector Auditing?</h2><div class='hbox'>Public sector entities are accountable for the use of resources derived from taxation and other sources. Public sector auditing helps create conditions and reinforce expectations that public entities will perform their functions effectively, efficiently, ethically, and in compliance with laws and regulations.</div><h2 class='sec'>Three Types of Public Sector Audit</h2><p class='fhint'>Click each card</p><div class='fgrid'><div class='fc' onclick='this.classList.toggle(\"flipped\")'><div class='fi'><div class='ff'><h3>Financial Audit</h3></div><div class='fb'>Determines whether financial information is presented in accordance with applicable financial reporting and regulatory framework. Expresses opinion on whether statements are free from material misstatement.</div></div></div><div class='fc' onclick='this.classList.toggle(\"flipped\")'><div class='fi'><div class='ff'><h3>Performance Audit</h3></div><div class='fb'>Focuses on whether programs and institutions perform in accordance with the principles of Economy, Efficiency, and Effectiveness - the 3 E's. Provides recommendations for improvement.</div></div></div><div class='fc' onclick='this.classList.toggle(\"flipped\")'><div class='fi'><div class='ff'><h3>Compliance Audit</h3></div><div class='fb'>Whether activities and financial transactions comply with authorities that govern the audited entity - rules, laws, regulations, policies, codes, and agreed terms.</div></div></div></div><h2 class='sec'>Five Elements of Public Sector Auditing</h2><table class='tbl'><tr><th>Element</th><th>In Public Sector Context</th></tr><tr><td><b>1. Auditor</b></td><td>Head of the Supreme Audit Institution (SAI) and delegated persons</td></tr><tr><td><b>2. Responsible Party</b></td><td>Determined by constitutional or legislative arrangement</td></tr><tr><td><b>3. Intended Users</b></td><td>Legislative and oversight bodies, those charged with governance, or the general public</td></tr><tr><td><b>4. Subject Matter</b></td><td>Information, condition, or activity measured against criteria - must be identifiable and capable of consistent evaluation</td></tr><tr><td><b>5. Criteria</b></td><td>Benchmarks used to evaluate the subject matter - must be relevant, understandable, complete, reliable, and objective</td></tr></table><h2 class='sec'>Levels of Assurance in Public Sector Auditing</h2><div class='cgrid'><div class='cbox left'><h4>Reasonable Assurance</h4><p class='cp'>High but not absolute. Opinion expressed positively: In the auditors opinion, the subject matter IS or IS NOT compliant in all material respects with the established criteria.</p></div><div class='cbox right'><h4>Limited Assurance</h4><p class='cp'>States that nothing has come to the auditors attention to cause the auditor to believe that the subject matter is not in compliance. Negative form of expression.</p></div></div>";
PAGES["t10s2"] = "<div class='page-hero'><span class='badge'>Topic 10</span><h1>KENAO and the Internal Audit Role in Public Entities</h1><p>Kenya national audit institution mandate and the role of internal auditing in public sector entities.</p></div><h2 class='sec'>Kenya National Audit Office - Office of the Auditor-General</h2><div class='hbox'><b>Constitutional Basis:</b> Chapter 12, Part 6, Article 229 of the Constitution of Kenya establishes the Office of the Auditor-General.</div><div class='card'><div class='ssec'>Appointment Requirements:</div><ul class='cl'><li>Nominated by the President, approved by National Assembly, appointed by President</li><li>Must have extensive knowledge of public finance OR at least 10 years experience in auditing or public finance management</li><li>Holds office for a term of 8 years - NOT eligible for reappointment</li></ul></div><div class='card' style='margin-top:1rem;'><div class='ssec'>Article 229 - What Must Be Audited within 6 months of financial year-end:</div><ul class='cl'><li>Accounts of national and county governments</li><li>Accounts of all funds and authorities of national and county governments</li><li>Accounts of all courts</li><li>Accounts of every commission and independent office established by the Constitution</li><li>Accounts of the National Assembly, Senate, and county assemblies</li><li>Accounts of political parties funded from public funds</li><li>The public debt</li><li>Accounts of any other entity that legislation requires the Auditor-General to audit</li></ul><div class='hbox' style='margin-top:0.75rem;'>The Auditor-General MAY also audit any entity funded from public funds.</div></div><h2 class='sec'>Internal Audit Role in Public Entities</h2><div class='card'><ul class='cl'><li>Evaluating and improving the effectiveness of risk management, control, and governance</li><li>Consultancy to identify obstacles to normal operations</li><li>Facilitating understanding of standards and normative provisions</li><li>Training and professional development on financial management, risk management, and internal control</li></ul></div><div class='wbox'><b>Important Limitation:</b> While internal auditing can provide assistance on internal control, it should NOT perform management or operational duties.</div><div class='etip'>Parliament or the relevant county assembly must debate and consider audit reports within 3 months of receiving them and take appropriate action.</div>";
PAGES["t10s3"] = "<div class='page-hero'><span class='badge'>Topic 10</span><h1>Five Roles of Public Sector Auditing</h1><p>Oversight, Detection, Deterrence, Insight, and Foresight - the complete scope of public sector audit.</p></div><h2 class='sec'>The Five Roles</h2><div class='accordion'><button class='ah' onclick='toggleAcc(this)'>1. Oversight - Are entities doing what they should? <span class='ai'>+</span></button><div class='ab'><div class='abi'><p class='cp'>Evaluates whether public sector entities are doing what they are supposed to do, spending funds for the intended purpose, and complying with laws and regulations. Answers: Has the policy been implemented as intended? and Are managers implementing effective controls to minimize risks?</p></div></div></div><div class='accordion'><button class='ah' onclick='toggleAcc(this)'>2. Detection - Identifying inappropriate acts <span class='ai'>+</span></button><div class='ab'><div class='abi'><ul class='cl'><li>Audits based on suspicious circumstances or complaints</li><li>Payroll and accounts payable audits testing disbursements and controls</li><li>Audits requested by law enforcement analyzing complex financial statements</li><li>Reviews of potential conflicts of interest</li></ul></div></div></div><div class='accordion'><button class='ah' onclick='toggleAcc(this)'>3. Deterrence - Reducing conditions allowing corruption <span class='ai'>+</span></button><div class='ab'><div class='abi'><ul class='cl'><li>Assessing controls for existing or proposed functions</li><li>Assessing organizational or audit-specific risks</li><li>Reviewing proposed changes to laws, rules, and implementation procedures</li><li>Reviewing contracts for potential conflicts of interest</li></ul></div></div></div><div class='accordion'><button class='ah' onclick='toggleAcc(this)'>4. Insight - Sharing best practices and analysis <span class='ai'>+</span></button><div class='ab'><div class='abi'><p class='cp'>Assists decision-makers by assessing which programs and policies are working, sharing best practices, and looking across entities for opportunities to improve management practices. Answers: Has the policy brought about the intended results?</p></div></div></div><div class='accordion'><button class='ah' onclick='toggleAcc(this)'>5. Foresight - Identifying emerging challenges <span class='ai'>+</span></button><div class='ab'><div class='abi'><p class='cp'>Highlights challenges to come - demographic trends, economic conditions, changing security threats, emerging technology - and identifies long-term risks that may exceed the terms of office for most officials. Risk-based auditing supports this function.</p></div></div></div><h2 class='sec'>General Principles of Public Sector Auditing</h2><table class='tbl'><tr><th>Principle</th><th>Key Requirements</th></tr><tr><td>Ethics and Independence</td><td>Comply with ethical requirements; remain independent so reports are impartial</td></tr><tr><td>Professional Judgment and Skepticism</td><td>Maintain professional distance and questioning attitude; due care and diligence</td></tr><tr><td>Quality Control</td><td>Direction, review, supervision; consultation on difficult matters</td></tr><tr><td>Audit Risk</td><td>Manage risk of inappropriate report; reduce to acceptably low level</td></tr><tr><td>Materiality</td><td>Consider value, nature, and context - qualitative and quantitative aspects</td></tr><tr><td>Documentation</td><td>Strategy, plan, procedures, evidence, conclusions - enough for experienced auditor with no prior knowledge</td></tr><tr><td>Communication</td><td>Keep audited entity informed throughout audit process</td></tr></table>";
PAGES["t10s4"] = "<div class='page-hero'><span class='badge'>Topic 10</span><h1>ISSAIs - International Standards for Supreme Audit Institutions</h1><p>The global framework of standards within INTOSAI governing supreme audit institutions worldwide.</p></div><h2 class='sec'>What Are ISSAIs?</h2><div class='hbox'><b>ISSAIs (International Standards for Supreme Audit Institutions)</b> - the framework of standards within INTOSAI (International Organization of Supreme Audit Institutions). Purpose: support INTOSAI members by providing standards and guidelines aimed at safeguarding independent and effective auditing.</div><h2 class='sec'>Three Benefits of Implementing ISSAIs</h2><p class='fhint'>Click each card</p><div class='fgrid'><div class='fc' onclick='this.classList.toggle(\"flipped\")'><div class='fi'><div class='ff'><h3>Quality</h3></div><div class='fb'>Carrying out audits in accordance with globally accepted standards ensures quality and consistency. Simplifies benchmarking, regional quality assurance, and peer reviews. Inspires continuous improvement.</div></div></div><div class='fc' onclick='this.classList.toggle(\"flipped\")'><div class='fi'><div class='ff'><h3>Credibility</h3></div><div class='fb'>Globally accepted standards strengthen credibility. External stakeholders gain increased confidence and trust. Audit conclusions can stand up to external scrutiny.</div></div></div><div class='fc' onclick='this.classList.toggle(\"flipped\")'><div class='fi'><div class='ff'><h3>Professionalism</h3></div><div class='fb'>Standards form the basis for professionalization. Common standards improve opportunities for exchange of professional views. Common language between public and private sector auditors.</div></div></div></div><h2 class='sec'>Public Sector Audit Planning Principles</h2><div class='card'><ol class='cl'><li><b>Establish clear terms:</b> Subject, scope, objectives, access to data, report format, roles and responsibilities</li><li><b>Understand the entity or programme:</b> Objectives, operations, regulatory environment, internal controls, systems</li><li><b>Risk assessment:</b> Consider and assess risk of deficiencies, deviations, or misstatements relevant to audit objective</li><li><b>Identify risks of fraud:</b> Maintain professional skepticism; enquire and perform procedures to identify fraud risks</li><li><b>Plan for effectiveness and efficiency:</b> Define scope, objectives, and approach; assign team and resources; set timetable</li></ol></div><h2 class='sec'>Public Sector Audit Report Types</h2><table class='tbl'><tr><th>Type</th><th>Engagement</th><th>Typical Report Name</th></tr><tr><td>Unmodified opinion</td><td>Subject matter free from material misstatement</td><td>Auditor General Report</td></tr><tr><td>Qualified except for</td><td>Material but not pervasive disagreement or scope limitation</td><td>Modified Auditor General Report</td></tr><tr><td>Adverse</td><td>Material and pervasive deviations or misstatements</td><td>Adverse Opinion Report</td></tr><tr><td>Disclaimer</td><td>Unable to obtain sufficient evidence - material and pervasive</td><td>Disclaimer Report</td></tr></table><div class='etip'>ISSAIs provide a common language and framework for financial, compliance, AND performance audit - all three types that exist in the public sector. The three benefits: Quality, Credibility, Professionalism.</div>";
PAGES["t11s1"] = "<div class='page-hero' style='background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);'><span class='badge'>Resources</span><h1>Course Summary - Key Concepts</h1><p>A consolidated review of the most critical concepts across all 10 topics for exam preparation.</p></div><div class='accordion'><button class='ah' onclick='toggleAcc(this)'>Topic 1: Assurance Engagements <span class='ai'>+</span></button><div class='ab'><div class='abi'><ul class='cl'><li>5 elements: three-party relationship, appropriate subject matter, suitable criteria, sufficient appropriate evidence, written report</li><li>Reasonable assurance = POSITIVE expression; Limited assurance = NEGATIVE expression</li><li>Suitable criteria: RCRUN - Relevance, Completeness, Reliability, Understandability, Neutrality</li><li>Limitations: sampling, judgment, inherent limits of internal control, persuasive not conclusive evidence</li></ul></div></div></div><div class='accordion'><button class='ah' onclick='toggleAcc(this)'>Topic 2: Nature of an Audit <span class='ai'>+</span></button><div class='ab'><div class='abi'><ul class='cl'><li>Audit = independent examination and expression of opinion</li><li>4 stages: Preliminary Engagement, Planning, Execution, Review and Completion</li><li>Transaction assertions: OACCC - Occurrence, Accuracy, Completeness, Cut-off, Classification</li><li>Balance assertions: ERCV - Existence, Rights and Obligations, Completeness, Valuation</li><li>Materiality is a threshold or cut-off point for significance of information</li></ul></div></div></div><div class='accordion'><button class='ah' onclick='toggleAcc(this)'>Topic 3: Legal Framework <span class='ai'>+</span></button><div class='ab'><div class='abi'><ul class='cl'><li>Caparo 3-part test: foreseeable loss, proximity, fair/just/reasonable</li><li>5 fundamental ethics principles: I-O-P-C-P - Integrity, Objectivity, Professional Competence, Confidentiality, Professional Behavior</li><li>5 threats: SSAFI - Self-interest, Self-review, Advocacy, Familiarity, Intimidation</li><li>No contingency fees; no percentage-of-profit fees</li><li>Opinion shopping: seeking auditor to support desired treatment</li></ul></div></div></div><div class='accordion'><button class='ah' onclick='toggleAcc(this)'>Topic 4: Planning and Risk <span class='ai'>+</span></button><div class='ab'><div class='abi'><ul class='cl'><li>AR = IR x CR x DR; DR is the only component under auditors control</li><li>10 red flags in client acceptance including frequent auditor changes, poor history, pressure to start quickly</li><li>Fraud vs Error: intentional vs unintentional</li><li>Primary responsibility for fraud prevention: MANAGEMENT</li><li>Expectations gap: public expects more than auditors legally deliver</li></ul></div></div></div><div class='accordion'><button class='ah' onclick='toggleAcc(this)'>Topics 5-7: Forensic, Controls, Evidence <span class='ai'>+</span></button><div class='ab'><div class='abi'><ul class='cl'><li>3 forensic investigation categories: Corruption, Asset Misappropriation, Financial Statement Fraud</li><li>ICQ vs ICEQ: ICQ checks if controls EXIST; ICEQ checks if errors COULD OCCUR</li><li>Evidence hierarchy: external most reliable, then internally generated with effective controls, then directly obtained, then documentary, then original documents</li><li>MUS: best for overstatement risk such as debtors and assets, NOT for creditors</li><li>CAATs: audit software to interrogate data, and test data which submits dummy data</li></ul></div></div></div><div class='accordion'><button class='ah' onclick='toggleAcc(this)'>Topics 8-10: Review, Reports, Public Sector <span class='ai'>+</span></button><div class='ab'><div class='abi'><ul class='cl'><li>Subsequent events: Adjusting (conditions existed at year-end) vs Non-adjusting (arose after)</li><li>Before signing = ACTIVE duty; After signing, before issue = PASSIVE duty; After issue = NO obligation</li><li>Going concern warning signs: net liabilities, maturity of borrowings, negative cash flows, loss of key customer</li><li>Opinion matrix: Disagreement plus pervasive = Adverse; Scope limitation plus pervasive = Disclaimer</li><li>Auditor-General: 8-year term; appointed by President with National Assembly approval</li><li>ISSAIs benefits: Quality, Credibility, Professionalism</li><li>Performance audit: 3 E - Economy, Efficiency, Effectiveness</li></ul></div></div></div>";
PAGES["t11s2"] = "<div class='page-hero' style='background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);'><span class='badge'>Resources</span><h1>Formulae, Mnemonics and Memory Aids</h1><p>Quick reference tools to help you remember key frameworks for the exam.</p></div><h2 class='sec'>Key Mnemonics</h2><div class='card'><div class='ssec'>5 Fundamental Ethics Principles: I-O-P-C-P</div><p class='cp'>Integrity, Objectivity, Professional Competence and Due Care, Confidentiality, Professional Behavior</p><div class='ssec' style='margin-top:1rem;'>5 Threats to Ethics: SSAFI</div><p class='cp'>Self-interest, Self-review, Advocacy, Familiarity, Intimidation</p><div class='ssec' style='margin-top:1rem;'>Suitable Criteria Characteristics: RCRUN</div><p class='cp'>Relevance, Completeness, Reliability, Understandability, Neutrality</p><div class='ssec' style='margin-top:1rem;'>Transaction Assertions: OACCC</div><p class='cp'>Occurrence, Accuracy, Completeness, Cut-off, Classification</p><div class='ssec' style='margin-top:1rem;'>Balance Assertions: ERCV</div><p class='cp'>Existence, Rights and Obligations, Completeness, Valuation</p></div><h2 class='sec'>The Audit Risk Formula</h2><div class='hbox' style='text-align:center;font-size:1.1rem;'><b>AR = IR x CR x DR</b><br><span style='font-size:0.85rem;opacity:0.8;'>Audit Risk = Inherent Risk x Control Risk x Detection Risk</span><br><br><span style='font-size:0.875rem;'>High IR or CR means must lower DR - more tests needed. Low IR and CR means can raise DR - fewer tests needed.</span></div><h2 class='sec'>Qualification Decision Matrix</h2><table class='tbl'><tr><th>Cause</th><th>Material but NOT Pervasive</th><th>PERVASIVE</th></tr><tr><td>Limitation or Uncertainty</td><td>Qualified (Except For)</td><td>Disclaimer</td></tr><tr><td>Disagreement</td><td>Qualified (Except For)</td><td>Adverse</td></tr></table><h2 class='sec'>Types of Audit Engagements - Quick Reference</h2><table class='tbl'><tr><th>Type</th><th>Assurance</th><th>Expression</th></tr><tr><td>Statutory Audit</td><td>Reasonable</td><td>Positive - In our opinion...</td></tr><tr><td>Review</td><td>Limited moderate</td><td>Negative - Nothing has come to attention...</td></tr><tr><td>Agreed-Upon Procedures</td><td>None</td><td>Factual findings only</td></tr><tr><td>Compilation</td><td>None</td><td>No assurance</td></tr></table><h2 class='sec'>Going Concern - Auditor Response Guide</h2><table class='tbl'><tr><th>Situation</th><th>Opinion Type</th><th>Extra Paragraph?</th></tr><tr><td>GC appropriate, no uncertainty</td><td>Unmodified</td><td>No</td></tr><tr><td>GC appropriate, material uncertainty, adequate disclosure</td><td>Unmodified</td><td>YES - Emphasis of Matter</td></tr><tr><td>GC appropriate, material uncertainty, INADEQUATE disclosure</td><td>Qualified or Adverse</td><td>Yes</td></tr><tr><td>GC use is INAPPROPRIATE</td><td>Adverse</td><td>Yes</td></tr></table><div style='background:linear-gradient(135deg,#1E3A8A,#2d5aba);border-radius:16px;padding:2rem;margin-top:2rem;text-align:center;color:white;'><div style='font-family:Georgia,serif;font-size:1.5rem;margin-bottom:0.5rem;'>Congratulations!</div><p style='color:rgba(255,255,255,0.8);font-size:0.9rem;max-width:500px;margin:0 auto;'>You have completed the MyCPA Auditing and Assurance study platform. Review any topics that need reinforcement, and you are ready to excel in your CPA examinations!</p><div style='margin-top:1rem;color:#F59E0B;font-size:0.875rem;'>Good luck, future CPA!</div></div>";

<script>
// Stars
(function(){var c=document.getElementById('stars');for(var i=0;i<140;i++){var s=document.createElement('div');s.className='star';var z=Math.random()*3+1;s.style.cssText='width:'+z+'px;height:'+z+'px;left:'+(Math.random()*100)+'%;top:'+(Math.random()*100)+'%;--d:'+(2+Math.random()*4)+'s;--dl:'+(Math.random()*5)+'s;';c.appendChild(s);}})();

var TOPICS=[
  {id:'t1',title:'Assurance Engagements',subs:[{id:'t1s1',t:'Definition and Objectives'},{id:'t1s2',t:'Elements of Assurance'},{id:'t1s3',t:'Types and Levels of Assurance'},{id:'t1s4',t:'Non-Assurance Engagements'}]},
  {id:'t2',title:'Nature and Purpose of an Audit',subs:[{id:'t2s1',t:'Definition and Objectives'},{id:'t2s2',t:'Stages of an Audit'},{id:'t2s3',t:'Development of Auditing'},{id:'t2s4',t:'Types of Audits'},{id:'t2s5',t:'Risk, Materiality and Assertions'}]},
  {id:'t3',title:'Legal Framework and Regulation',subs:[{id:'t3s1',t:'Auditor Liability'},{id:'t3s2',t:'Appointment and Rights'},{id:'t3s3',t:'ISAs and IESBA Code'},{id:'t3s4',t:'Fundamental Ethics Principles'},{id:'t3s5',t:'Independence and Fees'}]},
  {id:'t4',title:'Planning and Risk Assessment',subs:[{id:'t4s1',t:'Client Acceptance'},{id:'t4s2',t:'Understanding the Entity'},{id:'t4s3',t:'Audit Planning'},{id:'t4s4',t:'Audit Risk'},{id:'t4s5',t:'Fraud, Errors and Irregularities'}]},
  {id:'t5',title:'Forensic Accounting',subs:[{id:'t5s1',t:'Nature and Purpose'},{id:'t5s2',t:'Types of Forensic Investigations'},{id:'t5s3',t:'Fraud Prevention and Deterrence'}]},
  {id:'t6',title:'Internal Control Systems',subs:[{id:'t6s1',t:'Internal Controls Theory'},{id:'t6s2',t:'Evaluation and Tests of Control'},{id:'t6s3',t:'Management Letter'},{id:'t6s4',t:'IT Threats and Controls'}]},
  {id:'t7',title:'Audit Evidence',subs:[{id:'t7s1',t:'Assertions and Evidence'},{id:'t7s2',t:'Analytical Procedures'},{id:'t7s3',t:'Audit Sampling'},{id:'t7s4',t:'Audit of Specific Items'},{id:'t7s5',t:'Using Work of Others and CAATs'}]},
  {id:'t8',title:'Overall Audit Review',subs:[{id:'t8s1',t:'Subsequent Events Review'},{id:'t8s2',t:'Going Concern Review'},{id:'t8s3',t:'Management Representations'},{id:'t8s4',t:'Quality Control and Liquidation'}]},
  {id:'t9',title:'Audit Reports',subs:[{id:'t9s1',t:'7th Schedule and Basic Elements'},{id:'t9s2',t:'Types of Opinions'},{id:'t9s3',t:'Modified Reports and Scenarios'}]},
  {id:'t10',title:'Auditing in the Public Sector',subs:[{id:'t10s1',t:'Introduction and Types'},{id:'t10s2',t:'KENAO and Internal Audit Role'},{id:'t10s3',t:'Five Roles of Public Sector Audit'},{id:'t10s4',t:'ISSAIs and Public Sector Standards'}]},
  {id:'t11',title:'Course Summary and Resources',subs:[{id:'t11s1',t:'Key Concepts Summary'},{id:'t11s2',t:'Formulae and Memory Aids'}]}
];

var allIds=[];
var currentId=null;
var sbOpen=true;
var completed=new Set();

function buildIds(){allIds=[];TOPICS.forEach(function(t){t.subs.forEach(function(s){allIds.push(s.id);});});}

function startApp(){
  document.getElementById('landing').style.display='none';
  var a=document.getElementById('app');
  a.style.display='flex';
  buildIds();
  loadProgress();
  buildSidebar();
  buildPages();
  navTo(allIds[0]);
}

function buildSidebar(){
  var nav=document.getElementById('sbnav');
  TOPICS.forEach(function(topic,ti){
    if(ti===TOPICS.length-1){var d=document.createElement('div');d.className='sbdiv';nav.appendChild(d);}
    var wrap=document.createElement('div');
    var btn=document.createElement('button');
    btn.className='tb';
    var num=ti<10?(ti+1).toString():'S';
    btn.innerHTML='<span class="tn">'+num+'</span><span style="flex:1;text-align:left;">'+topic.title+'</span><span class="tchev">&#9654;</span>';
    var sublist=document.createElement('div');
    sublist.className='sbl';
    sublist.id='sbl-'+topic.id;
    btn.onclick=(function(b,sl){return function(){var o=sl.classList.contains('open');sl.classList.toggle('open',!o);b.classList.toggle('open',!o);};})(btn,sublist);
    topic.subs.forEach(function(sub){
      var sb=document.createElement('button');
      sb.className='stb';
      sb.id='nav-'+sub.id;
      var done=completed.has(sub.id);
      sb.innerHTML='<span style="flex:1;text-align:left;">'+sub.t+'</span><span class="ck">'+(done?'&#10003;':'')+'</span>';
      sb.onclick=(function(sid){return function(){navTo(sid);};})(sub.id);
      sublist.appendChild(sb);
    });
    wrap.appendChild(btn);
    wrap.appendChild(sublist);
    nav.appendChild(wrap);
  });
}

function buildPages(){
  var cont=document.getElementById('pgcont');
  allIds.forEach(function(id){
    var div=document.createElement('div');
    div.className='pg';
    div.id='pg-'+id;
    div.innerHTML=(PAGES[id]||'<div class="page-hero"><h1>Loading...</h1></div>');
    var done=completed.has(id);
    var btn=document.createElement('button');
    btn.className='cbtn'+(done?' done':'');
    btn.textContent=done?'Completed':'Mark as Complete';
    btn.id='cb-'+id;
    btn.onclick=(function(sid){return function(){markDone(sid);};})(id);
    div.appendChild(btn);
    cont.appendChild(div);
  });
}

function navTo(id){
  if(currentId){
    var op=document.getElementById('pg-'+currentId);
    if(op)op.classList.remove('active');
    var on=document.getElementById('nav-'+currentId);
    if(on)on.classList.remove('active');
  }
  currentId=id;
  var pg=document.getElementById('pg-'+id);
  if(pg){pg.classList.add('active');document.getElementById('content').scrollTop=0;}
  var nb=document.getElementById('nav-'+id);
  if(nb){
    nb.classList.add('active');
    var el=nb.parentElement;
    while(el){
      if(el.classList&&el.classList.contains('sbl')){
        el.classList.add('open');
        var pb=el.previousElementSibling;
        if(pb&&pb.classList.contains('tb'))pb.classList.add('open');
      }
      el=el.parentElement;
    }
    nb.scrollIntoView({block:'nearest',behavior:'smooth'});
  }
  updateProgress();
}

function toggleSidebar(){sbOpen=!sbOpen;document.getElementById('sidebar').classList.toggle('collapsed',!sbOpen);}
function navNext(){var i=allIds.indexOf(currentId);if(i<allIds.length-1)navTo(allIds[i+1]);}
function navPrev(){var i=allIds.indexOf(currentId);if(i>0)navTo(allIds[i-1]);}

function markDone(id){
  if(completed.has(id)){
    completed.delete(id);
    var btn=document.getElementById('cb-'+id);
    if(btn){btn.textContent='Mark as Complete';btn.classList.remove('done');}
    var nb=document.getElementById('nav-'+id);
    if(nb)nb.querySelector('.ck').innerHTML='';
  }else{
    completed.add(id);
    var btn=document.getElementById('cb-'+id);
    if(btn){btn.textContent='Completed';btn.classList.add('done');}
    var nb=document.getElementById('nav-'+id);
    if(nb)nb.querySelector('.ck').innerHTML='&#10003;';
  }
  saveProgress();
  updateProgress();
}

function updateProgress(){
  var total=allIds.length,done=completed.size;
  document.getElementById('pbar').style.width=(total>0?(done/total*100):0)+'%';
  document.getElementById('ptxt').textContent=done+' / '+total;
}
function saveProgress(){try{localStorage.setItem('mycpa_v3',JSON.stringify([].concat(Array.from(completed))));}catch(e){}}
function loadProgress(){try{var s=localStorage.getItem('mycpa_v3');if(s)JSON.parse(s).forEach(function(id){completed.add(id);});}catch(e){}}

function checkAnswer(btn){
  var qDiv=btn.closest('.qq');
  if(!qDiv||qDiv.dataset.answered)return;
  qDiv.dataset.answered='1';
  var correct=qDiv.dataset.answer;
  var opts=qDiv.querySelectorAll('.qopt');
  var letters='ABCD';
  opts.forEach(function(opt,i){
    if(letters[i]===correct)opt.classList.add('correct');
    else opt.classList.add('reveal');
    opt.disabled=true;
  });
  var exp=qDiv.querySelector('.qexp');
  if(exp)exp.style.display='block';
  btn.disabled=true;
  btn.textContent='Answer Revealed';
  btn.style.background='#6b7280';
}

function toggleAcc(header){
  var body=header.nextElementSibling;
  var open=body.classList.contains('open');
  body.classList.toggle('open',!open);
  header.classList.toggle('open',!open);
}

document.addEventListener('keydown',function(e){
  if(document.getElementById('app').style.display==='none')return;
  if(e.key==='ArrowRight'||e.key===']')navNext();
  if(e.key==='ArrowLeft'||e.key==='[')navPrev();
});
</script>
</body>
</html>
